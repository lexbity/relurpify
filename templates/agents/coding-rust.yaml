apiVersion: relurpify/v1alpha1
kind: AgentManifest
metadata:
    name: coding-rust
    version: 1.0.0
    description: Rust-focused coding agent manifest
spec:
    image: ghcr.io/lexcodex/relurpify/runtime:latest
    runtime: gvisor
    defaults:
        permissions:
            filesystem:
                - action: fs:read
                  path: ${workspace}/**
                  justification: Read workspace
                - action: fs:list
                  path: ${workspace}/**
                  justification: List workspace
                - action: fs:write
                  path: ${workspace}/**
                  justification: Modify workspace
                - action: fs:execute
                  path: ${workspace}/**
                  justification: Execute tooling inside workspace
            executables:
                - binary: cargo
                  args: ["*"]
                - binary: rustfmt
                  args: ["*"]
                - binary: git
                  args: ["*"]
                - binary: bash
                  args: ["-c", "*"]
            network:
                - direction: egress
                  protocol: tcp
                  host: localhost
                  port: 11434
                  description: Ollama
        resources:
            limits:
                cpu: "2"
                memory: 4Gi
                disk_io: 200MBps
    security:
        run_as_user: 1000
        read_only_root: false
        no_new_privileges: true
    audit:
        level: verbose
        retention_days: 7
    agent:
        implementation: coding
        mode: primary
        version: 1.0.0
        prompt: You are coding. Follow project rules, ask before destructive actions, and summarize outcomes. Never call file_delete unless the user explicitly asks to delete something.
        model:
            provider: ollama
            name: qwen2.5-coder:14b
            temperature: 0.2
            max_tokens: 4096
        bash_permissions:
            default: ask
            allow_patterns: []
            deny_patterns: []
        file_permissions:
            write:
                default: allow
                allow_patterns: ["**"]
            edit:
                default: allow
                allow_patterns: ["**"]
        ollama_tool_calling: true
    policies:
        destructive: ask
        default_tool_policy: ask
    skills:
        - system
        - coding
        - rustcoder
