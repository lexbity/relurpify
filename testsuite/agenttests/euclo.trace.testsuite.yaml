apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo.trace
  description: Euclo trace analysis tests.
  owner: agent-platform
  tier: stable
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: true
    timeout: 120s
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  recording:
    mode: 'off'
  cases:
  - name: explicit_trace_request
    description: Trace-oriented debug prompt should stay on trace/analyze path.
    task_type: analysis
    setup:
      files:
      - path: testsuite/fixtures/trace_target.go
        content: "package main\n\nfunc Handle() error {\n  return nil\n}\n"
    prompt: Trace this function and analyze where the failure originates.
    context:
      context_file_contents:
      - path: testsuite/fixtures/trace_target.go
        content: "package main\n\nfunc Handle() error {\n  return nil\n}\n"
      extensions:
        euclo:
          mode: debug
    expect:
      outcome:
        must_succeed: true
        extensions:
          euclo:
            mode: debug
  - name: trace_to_candidate_root_cause
    description: Trace analysis should produce anomaly/root-cause oriented output.
    task_type: analysis
    prompt: Analyze the trace and identify the most likely root cause candidate.
    context:
      extensions:
        euclo:
          mode: debug
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)(trace|root cause|candidate|frame)
