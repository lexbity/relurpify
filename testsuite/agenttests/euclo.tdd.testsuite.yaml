apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo.tdd
  description: "Euclo TDD mode interaction flow tests."
  owner: agent-platform
  tier: stable
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: true
    timeout: 120s
  workspace:
    strategy: derived
    exclude:
      - .git/**
      - .gocache/**
      - .gomodcache/**
      - relurpify_cfg/test_runs/**
  models:
    - name: qwen2.5-coder:14b
      endpoint: http://localhost:11434
  recording:
    mode: off
  cases:
    - name: new_function_tdd
      description: "TDD: write tests first, then implement."
      task_type: code_generation
      tags: [coverage-matrix, tdd, test_driven_generation]
      setup:
        files:
          - path: testsuite/fixtures/strings.go
            content: |
              package main
      prompt: "Write tests first for a Reverse(s string) string function in testsuite/fixtures/strings_test.go, then implement Reverse in testsuite/fixtures/strings.go using TDD."
      context:
        euclo.mode: tdd
        context_file_contents:
          - path: testsuite/fixtures/strings.go
            content: |
              package main
      expect:
        must_succeed: true
        files_changed:
          - "testsuite/fixtures/strings_test.go"
          - "testsuite/fixtures/strings.go"
        euclo:
          mode: tdd
          profile: test_driven_generation

    - name: add_test_cases
      description: "TDD mode: add test cases to existing function."
      task_type: code_modification
      setup:
        files:
          - path: testsuite/fixtures/math.go
            content: |
              package main

              func Max(a, b int) int {
                if a > b {
                  return a
                }
                return b
              }
          - path: testsuite/fixtures/math_test.go
            content: |
              package main

              import "testing"

              func TestMax_BasicPositive(t *testing.T) {
                if Max(3, 5) != 5 {
                  t.Error("expected 5")
                }
              }
      prompt: "Add tests for Max with negative numbers, equal values, and zero using TDD approach in testsuite/fixtures/math_test.go."
      context:
        euclo.mode: tdd
        context_file_contents:
          - path: testsuite/fixtures/math.go
            content: |
              package main

              func Max(a, b int) int {
                if a > b {
                  return a
                }
                return b
              }
          - path: testsuite/fixtures/math_test.go
            content: |
              package main

              import "testing"

              func TestMax_BasicPositive(t *testing.T) {
                if Max(3, 5) != 5 {
                  t.Error("expected 5")
                }
              }
      expect:
        must_succeed: true
        files_changed: ["testsuite/fixtures/math_test.go"]
        euclo:
          mode: tdd
          profile: test_driven_generation
