apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo.artifact_chain
  description: "Euclo cross-phase artifact production and consumption tests."
  owner: agent-platform
  tier: stable
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: true
    timeout: 150s
  workspace:
    strategy: derived
    exclude:
      - .git/**
      - .gocache/**
      - .gomodcache/**
      - relurpify_cfg/test_runs/**
  models:
    - name: qwen2.5-coder:14b
      endpoint: http://localhost:11434
  recording:
    mode: off
  cases:
    - name: planning_plan_artifact_flows_into_execution
      description: "A committed plan should be recorded as produced in planning and consumed once execution begins."
      task_type: code_modification
      timeout: 150s
      setup:
        files:
          - path: testsuite/fixtures/rate_limit_handler.go
            content: |
              package main

              func HandleRequest() string {
                return "ok"
              }
      prompt: "Plan and implement adding rate limiting to HandleRequest in testsuite/fixtures/rate_limit_handler.go."
      context:
        euclo.mode: planning
      expect:
        must_succeed: true
        euclo:
          artifact_chain:
            - kind: plan
              produced_by_phase: commit
              consumed_by_phase: plan

    - name: code_edit_intent_flows_into_verification
      description: "Code execution should record edit intent production before verification consumes it."
      task_type: code_modification
      timeout: 120s
      setup:
        files:
          - path: testsuite/fixtures/create_user.go
            content: |
              package main

              func CreateUser(name string) error {
                return nil
              }
      prompt: "Add input validation to CreateUser in testsuite/fixtures/create_user.go."
      context:
        euclo.mode: code
      expect:
        must_succeed: true
        euclo:
          artifact_chain:
            - kind: edit_intent
              produced_by_phase: edit
              consumed_by_phase: verify
