apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: coding.node
  description: Node.js-focused prompts for the coding agent across common workflows.
  owner: agent-platform
  tier: stable
  quarantined: false
spec:
  agent_name: coding
  manifest: relurpify_cfg/agents/coding-node.yaml
  execution:
    profile: ci-live
    strict: true
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  cases:
  - name: easy_fix_bug_and_run_tests
    task_type: code_modification
    requires:
      executables:
      - node
      tools:
      - cli_node
    setup:
      files:
      - path: testsuite/agenttest_fixtures/nodesuite/sum.js
        content: "function add(a, b) {\n  return a + b + 1;\n}\n\nmodule.exports =\
          \ { add };\n"
      - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
        content: 'const assert = require("assert");

          const { add } = require("./sum");


          assert.strictEqual(add(2, 2), 4);

          assert.strictEqual(add(-1, 1), 0);


          console.log("ok");

          '
    overrides:
      allowed_capabilities:
      - name: cli_node
        kind: tool
    prompt: Fix the failing tests in testsuite/agenttest_fixtures/nodesuite (do not
      change test_sum.js), then run cli_node args ["test_sum.js"] with working_directory
      "testsuite/agenttest_fixtures/nodesuite".
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/nodesuite/sum.js
      benchmark:
        tools_expected:
        - cli_node
  - name: medium_add_mul_and_run_tests
    task_type: code_modification
    requires:
      executables:
      - node
      tools:
      - cli_node
    setup:
      files:
      - path: testsuite/agenttest_fixtures/nodesuite/sum.js
        content: "function add(a, b) {\n  return a + b;\n}\n\nmodule.exports = { add\
          \ };\n"
      - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
        content: 'const assert = require("assert");

          const { add, mul } = require("./sum");


          assert.strictEqual(add(2, 2), 4);

          assert.strictEqual(mul(3, 4), 12);


          console.log("ok");

          '
    overrides:
      allowed_capabilities:
      - name: cli_node
        kind: tool
    prompt: Implement mul(a,b) in testsuite/agenttest_fixtures/nodesuite/sum.js (do
      not change test_sum.js), then run cli_node args ["test_sum.js"] with working_directory
      "testsuite/agenttest_fixtures/nodesuite".
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/nodesuite/sum.js
      benchmark:
        tools_expected:
        - cli_node
  - name: syntax_error_fix_and_run_tests
    task_type: code_modification
    requires:
      executables:
      - node
      tools:
      - cli_node
    setup:
      files:
      - path: testsuite/agenttest_fixtures/nodesuite/sum.js
        content: "function add(a, b) {\n  return a + b\n\nmodule.exports = { add };\n"
      - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
        content: 'const assert = require("assert");

          const { add } = require("./sum");


          assert.strictEqual(add(2, 2), 4);

          console.log("ok");

          '
    overrides:
      allowed_capabilities:
      - name: cli_node
        kind: tool
    prompt: Fix the syntax error in testsuite/agenttest_fixtures/nodesuite/sum.js,
      then run cli_node args ["test_sum.js"] with working_directory "testsuite/agenttest_fixtures/nodesuite".
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/nodesuite/sum.js
      benchmark:
        tools_expected:
        - cli_node
  - name: verify_already_correct_without_edits
    task_type: analysis
    requires:
      executables:
      - node
      tools:
      - cli_node
    setup:
      files:
      - path: testsuite/agenttest_fixtures/nodesuite/sum.js
        content: "function add(a, b) {\n  return a + b;\n}\n\nmodule.exports = { add\
          \ };\n"
      - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
        content: 'const assert = require("assert");

          const { add } = require("./sum");


          assert.strictEqual(add(2, 2), 4);

          console.log("ok");

          '
    overrides:
      allowed_capabilities:
      - name: cli_node
        kind: tool
    prompt: Run cli_node args ["test_sum.js"] with working_directory "testsuite/agenttest_fixtures/nodesuite"
      and confirm whether the module is already correct. Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)(correct|passes|ok)
        no_file_changes: true
      benchmark:
        tools_expected:
        - cli_node
  - name: multi_file_module_fix_and_run_tests
    task_type: code_modification
    requires:
      executables:
      - node
      tools:
      - cli_node
    setup:
      files:
      - path: testsuite/agenttest_fixtures/nodesuite/sum.js
        content: 'const { add } = require("./math");


          module.exports = { add };

          '
      - path: testsuite/agenttest_fixtures/nodesuite/math.js
        content: "function add(a, b) {\n  return a + b;\n}\n\nmodule.exports = { add\
          \ };\n"
      - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
        content: 'const assert = require("assert");

          const { add, mul } = require("./sum");


          assert.strictEqual(add(2, 2), 4);

          assert.strictEqual(mul(3, 4), 12);


          console.log("ok");

          '
    overrides:
      allowed_capabilities:
      - name: cli_node
        kind: tool
    prompt: Implement mul(a,b) in testsuite/agenttest_fixtures/nodesuite/math.js and
      export it from testsuite/agenttest_fixtures/nodesuite/sum.js without changing
      tests, then run cli_node args ["test_sum.js"] with working_directory "testsuite/agenttest_fixtures/nodesuite".
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/nodesuite/sum.js
        - testsuite/agenttest_fixtures/nodesuite/math.js
      benchmark:
        tools_expected:
        - cli_node
