apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: coding.node
  description: "Node.js-focused prompts for the coding agent across common workflows."
spec:
  agent_name: coding
  manifest: relurpify_cfg/agents/coding-node.yaml
  workspace:
    strategy: derived
    exclude:
      - .git/**
      - relurpify_cfg/test_runs/**
  models:
    - name: qwen2.5-coder:14b
      endpoint: http://localhost:11434
  cases:
    - name: easy_fix_bug_and_run_tests
      task_type: code_modification
      requires:
        executables: ["node"]
        tools: ["cli_node"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/nodesuite/sum.js
            content: |
              function add(a, b) {
                return a + b + 1;
              }

              module.exports = { add };
          - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
            content: |
              const assert = require("assert");
              const { add } = require("./sum");

              assert.strictEqual(add(2, 2), 4);
              assert.strictEqual(add(-1, 1), 0);

              console.log("ok");
      overrides:
        allowed_capabilities:
          - name: cli_node
            kind: tool

      prompt: "Fix the failing tests in testsuite/agenttest_fixtures/nodesuite (do not change test_sum.js), then run cli_node args [\"test_sum.js\"] with working_directory \"testsuite/agenttest_fixtures/nodesuite\"."
      expect:
        must_succeed: true
        files_changed: ["testsuite/agenttest_fixtures/nodesuite/sum.js"]
        tool_calls_must_include: ["cli_node"]
    - name: medium_add_mul_and_run_tests
      task_type: code_modification
      requires:
        executables: ["node"]
        tools: ["cli_node"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/nodesuite/sum.js
            content: |
              function add(a, b) {
                return a + b;
              }

              module.exports = { add };
          - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
            content: |
              const assert = require("assert");
              const { add, mul } = require("./sum");

              assert.strictEqual(add(2, 2), 4);
              assert.strictEqual(mul(3, 4), 12);

              console.log("ok");
      overrides:
        allowed_capabilities:
          - name: cli_node
            kind: tool

      prompt: "Implement mul(a,b) in testsuite/agenttest_fixtures/nodesuite/sum.js (do not change test_sum.js), then run cli_node args [\"test_sum.js\"] with working_directory \"testsuite/agenttest_fixtures/nodesuite\"."
      expect:
        must_succeed: true
        files_changed: ["testsuite/agenttest_fixtures/nodesuite/sum.js"]
        tool_calls_must_include: ["cli_node"]
    - name: syntax_error_fix_and_run_tests
      task_type: code_modification
      requires:
        executables: ["node"]
        tools: ["cli_node"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/nodesuite/sum.js
            content: |
              function add(a, b) {
                return a + b

              module.exports = { add };
          - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
            content: |
              const assert = require("assert");
              const { add } = require("./sum");

              assert.strictEqual(add(2, 2), 4);
              console.log("ok");
      overrides:
        allowed_capabilities:
          - name: cli_node
            kind: tool

      prompt: "Fix the syntax error in testsuite/agenttest_fixtures/nodesuite/sum.js, then run cli_node args [\"test_sum.js\"] with working_directory \"testsuite/agenttest_fixtures/nodesuite\"."
      expect:
        must_succeed: true
        files_changed: ["testsuite/agenttest_fixtures/nodesuite/sum.js"]
        tool_calls_must_include: ["cli_node"]
    - name: verify_already_correct_without_edits
      task_type: analysis
      requires:
        executables: ["node"]
        tools: ["cli_node"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/nodesuite/sum.js
            content: |
              function add(a, b) {
                return a + b;
              }

              module.exports = { add };
          - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
            content: |
              const assert = require("assert");
              const { add } = require("./sum");

              assert.strictEqual(add(2, 2), 4);
              console.log("ok");
      overrides:
        allowed_capabilities:
          - name: cli_node
            kind: tool

      prompt: "Run cli_node args [\"test_sum.js\"] with working_directory \"testsuite/agenttest_fixtures/nodesuite\" and confirm whether the module is already correct. Do not modify any files."
      expect:
        must_succeed: true
        no_file_changes: true
        output_regex:
          - "(?i)(correct|passes|ok)"
        tool_calls_must_include: ["cli_node"]
    - name: multi_file_module_fix_and_run_tests
      task_type: code_modification
      requires:
        executables: ["node"]
        tools: ["cli_node"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/nodesuite/sum.js
            content: |
              const { add } = require("./math");

              module.exports = { add };
          - path: testsuite/agenttest_fixtures/nodesuite/math.js
            content: |
              function add(a, b) {
                return a + b;
              }

              module.exports = { add };
          - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
            content: |
              const assert = require("assert");
              const { add, mul } = require("./sum");

              assert.strictEqual(add(2, 2), 4);
              assert.strictEqual(mul(3, 4), 12);

              console.log("ok");
      overrides:
        allowed_capabilities:
          - name: cli_node
            kind: tool
      prompt: "Implement mul(a,b) in testsuite/agenttest_fixtures/nodesuite/math.js and export it from testsuite/agenttest_fixtures/nodesuite/sum.js without changing tests, then run cli_node args [\"test_sum.js\"] with working_directory \"testsuite/agenttest_fixtures/nodesuite\"."
      expect:
        must_succeed: true
        files_changed:
          - testsuite/agenttest_fixtures/nodesuite/sum.js
          - testsuite/agenttest_fixtures/nodesuite/math.js
        tool_calls_must_include:
          - cli_node
