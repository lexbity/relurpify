apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo.baseline.bkc
  description: BKC baseline coverage via full archaeology.explore interaction flow.
    BKC capabilities fire only when the Archaeo service surfaces pattern/tension refs,
    which are unavailable in CI. These tests verify the full dispatch chain that contains
    BKC by exercising archaeology.explore end-to-end.
  owner: agent-platform
  tier: stable
  classification: capability
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: true
    timeout: 90s
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
    ignore_changes:
    - relurpify_cfg/logs/skills.log
    - relurpify_cfg/artifacts/euclo/deferred/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  recording:
    mode: "off"
  cases:
  - name: bkc_explore_struct_package
    description: Full archaeology.explore interaction flow on a package with typed
      structs. Exercises the complete BKC dispatch path; BKC invocation is soft-benchmarked
      because it requires the Archaeo service to surface refs.
    task_type: analysis
    prompt: Explore the Go package in testsuite/fixtures/bkc_struct_pkg/ and produce
      an exploration artifact describing its types and relationships. Do not modify
      any files.
    tags:
    - baseline
    - bkc
    - explore
    - level:1
    context:
      workflow_id: wf-bkc-baseline-explore-struct
      euclo.mode: archaeology
    setup:
      files:
      - path: testsuite/fixtures/bkc_struct_pkg/types.go
        content: "package bkcstructpkg\n\ntype Account struct {\n\tID      string\n\
          \tBalance int\n\tOwner   string\n}\n\ntype Transaction struct {\n\tID\
          \     string\n\tAmount int\n\tFrom   string\n\tTo     string\n}\n"
      - path: testsuite/fixtures/bkc_struct_pkg/ledger.go
        content: "package bkcstructpkg\n\nfunc NewLedger() *Ledger {\n\treturn &Ledger{accounts:\
          \ map[string]*Account{}}\n}\n\ntype Ledger struct {\n\taccounts map[string]*Account\n\
          }\n\nfunc (l *Ledger) Add(a *Account) {\n\tl.accounts[a.ID] = a\n}\n\
          \nfunc (l *Ledger) Get(id string) (*Account, bool) {\n\ta, ok := l.accounts[id]\n\
          \treturn a, ok\n}\n"
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
      benchmark:
        euclo:
          primary_relurpic_capability: euclo:archaeology.explore
          artifacts_produced:
          - exploration

  - name: bkc_explore_interface_package
    description: Full archaeology.explore interaction flow on a package with interface
      types. Exercises the exploration pass that feeds the BKC compile path in production.
    task_type: analysis
    prompt: Explore the Go package in testsuite/fixtures/bkc_iface_pkg/ and produce
      an exploration artifact describing its interfaces and implementations. Do not
      modify any files.
    tags:
    - baseline
    - bkc
    - explore
    - level:1
    context:
      workflow_id: wf-bkc-baseline-explore-iface
      euclo.mode: archaeology
    setup:
      files:
      - path: testsuite/fixtures/bkc_iface_pkg/store.go
        content: "package bkcifacepkg\n\ntype Reader interface {\n\tRead(key string)\
          \ (string, bool)\n}\n\ntype Writer interface {\n\tWrite(key, value string)\n\
          }\n\ntype Store interface {\n\tReader\n\tWriter\n\tDelete(key string)\n\
          }\n"
      - path: testsuite/fixtures/bkc_iface_pkg/memstore.go
        content: "package bkcifacepkg\n\ntype MemStore struct {\n\tdata map[string]string\n\
          }\n\nfunc NewMemStore() *MemStore {\n\treturn &MemStore{data: map[string]string{}}\n\
          }\n\nfunc (m *MemStore) Read(key string) (string, bool) {\n\tv, ok := m.data[key]\n\
          \treturn v, ok\n}\n\nfunc (m *MemStore) Write(key, value string) {\n\t\
          m.data[key] = value\n}\n\nfunc (m *MemStore) Delete(key string) {\n\t\
          delete(m.data, key)\n}\n"
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
      benchmark:
        euclo:
          primary_relurpic_capability: euclo:archaeology.explore
          artifacts_produced:
          - exploration

  - name: bkc_explore_then_compile_plan
    description: Full archaeology flow through explore and compile-plan. Validates
      the complete chain that BKC operates within. BKC checkpoint is soft-benchmarked
      against the implement-plan phase.
    task_type: analysis
    prompt: Explore the Go package in testsuite/fixtures/bkc_chain_pkg/ and compile
      an implementation plan for adding an error return to the Process function. Do
      not modify any files.
    tags:
    - baseline
    - bkc
    - explore
    - compile-plan
    - level:2
    timeout: 120s
    context:
      workflow_id: wf-bkc-baseline-chain
      euclo.mode: archaeology
    setup:
      files:
      - path: testsuite/fixtures/bkc_chain_pkg/processor.go
        content: "package bkcchainpkg\n\ntype Processor struct {\n\tname string\n\
          }\n\nfunc NewProcessor(name string) *Processor {\n\treturn &Processor{name:\
          \ name}\n}\n\nfunc (p *Processor) Process(input string) string {\n\tif\
          \ input == \"\" {\n\t\treturn \"\"\n\t}\n\treturn p.name + \": \" + input\n\
          }\n"
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
      benchmark:
        euclo:
          artifacts_produced:
          - exploration
