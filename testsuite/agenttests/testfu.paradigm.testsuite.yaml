apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: testfu.paradigm
  description: 'Full paradigm coverage via testfu: runs all suites for each paradigm
    agent.'
  owner: agent-platform
  tier: stable
  quarantined: false
spec:
  agent_name: testfu
  manifest: relurpify_cfg/agents/testfu.yaml
  execution:
    profile: ci-live
    strict: false
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  cases:
  - name: paradigm_react
    tags:
    - stable
    - paradigm
    task_type: analysis
    timeout: 900s
    prompt: Run all react agent test suites.
    context:
      agent_name: react
      timeout: 60s
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
  - name: paradigm_planner
    tags:
    - stable
    - paradigm
    task_type: analysis
    timeout: 900s
    prompt: Run all planner agent test suites.
    context:
      agent_name: planner
      timeout: 60s
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
  - name: paradigm_htn
    tags:
    - stable
    - paradigm
    task_type: analysis
    timeout: 900s
    prompt: Run all HTN agent test suites.
    context:
      agent_name: htn
      timeout: 60s
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
  - name: paradigm_rewoo
    tags:
    - stable
    - paradigm
    task_type: analysis
    timeout: 900s
    prompt: Run all ReWOO agent test suites.
    context:
      agent_name: rewoo
      timeout: 60s
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
  - name: paradigm_reflection
    tags:
    - stable
    - paradigm
    task_type: analysis
    timeout: 600s
    prompt: Run all reflection agent test suites.
    context:
      agent_name: reflection
      timeout: 60s
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
  - name: paradigm_all_smoke
    tags:
    - stable
    - paradigm
    - smoke-sweep
    task_type: analysis
    timeout: 600s
    prompt: Run smoke-tagged cases for the react paradigm suites as representative
      smoke sweep.
    context:
      agent_name: react
      tags: smoke
      timeout: 60s
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
