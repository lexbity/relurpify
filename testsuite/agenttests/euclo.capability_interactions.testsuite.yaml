apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo.capability_interactions
  description: Euclo cross-capability composition tests.
  owner: agent-platform
  tier: stable
  classification: capability
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: true
    timeout: 120s
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  recording:
    mode: 'off'
  cases:
  - name: regression_to_fix_flow
    description: Regression investigation should compose with follow-on fix behavior.
    tags:
    - level:1
    task_type: code_modification
    setup:
      files:
      - path: testsuite/fixtures/interaction_regression.go
        content: "package main\n\nfunc Multiply(a, b int) int {\n  return a + b\n}\n"
    prompt: Investigate the regression in Multiply after recent changes and fix it.
    context:
      context_file_contents:
      - path: testsuite/fixtures/interaction_regression.go
        content: "package main\n\nfunc Multiply(a, b int) int {\n  return a + b\n}\n"
      extensions:
        euclo:
          mode: debug
    expect:
      outcome:
        must_succeed: true
        extensions:
          euclo:
            mode: debug
  - name: review_then_safe_implement
    description: Review findings should flow into implement-if-safe behavior.
    tags:
    - level:2
    task_type: code_modification
    setup:
      files:
      - path: testsuite/fixtures/interaction_review.go
        content: 'package main


          // TODO remove debug

          func Run() {}

          '
    prompt: Review this file and implement fixes if safe.
    context:
      context_file_contents:
      - path: testsuite/fixtures/interaction_review.go
        content: 'package main


          // TODO remove debug

          func Run() {}

          '
      extensions:
        euclo:
          mode: review
    expect:
      outcome:
        must_succeed: true
        extensions:
          euclo:
            mode: review
  - name: contract_pre_execution_guard_fires
    description: "4.5: write capability not in admitted set \u2014 pre-execution contract guard blocks execution, not crash."
    tags:
    - stable
    - capability-contract
    - level:2
    task_type: code_modification
    setup:
      files:
      - path: testsuite/fixtures/contract_target.go
        content: 'package main


          func Noop() {}

          '
    prompt: Add a Shutdown function to testsuite/fixtures/contract_target.go.
    context:
      context_file_contents:
      - path: testsuite/fixtures/contract_target.go
        content: 'package main


          func Noop() {}

          '
      extensions:
        euclo:
          mode: code
    overrides:
      allowed_capabilities:
      - name: file_read
        kind: tool
    expect:
      outcome:
        no_file_changes: true
  - name: contract_lazy_semantic_acquisition
    description: "4.5: capability acquired lazily mid-execution \u2014 state key records LazySemanticAcquisitionTriggered."
    task_type: code_modification
    tags:
    - stable
    - capability-contract
    - level:2
    setup:
      files:
      - path: testsuite/fixtures/contract_lazy.go
        content: "package main\n\nfunc Load() string {\n  return \"loaded\"\n}\n"
    prompt: 'Inspect testsuite/fixtures/contract_lazy.go to understand its structure, then add an Unload function that returns
      "unloaded". Use file_read first to explore, then file_write to apply the change.

      '
    context:
      context_file_contents:
      - path: testsuite/fixtures/contract_lazy.go
        content: "package main\n\nfunc Load() string {\n  return \"loaded\"\n}\n"
      extensions:
        euclo:
          mode: code
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/fixtures/contract_lazy.go
        extensions:
          euclo:
            mode: code
