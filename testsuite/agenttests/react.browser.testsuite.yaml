apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: react.browser
  description: Live browser-backed coverage against fixture-served pages.
  owner: agent-platform
  tier: live-flaky
  quarantined: false
spec:
  agent_name: react
  manifest: relurpify_cfg/agents/react-browser.yaml
  execution:
    profile: ci-live
    strict: true
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  cases:
  - name: browser_reads_fixture_page
    description: ReAct should open a fixture page in the browser and report its visible
      content.
    task_type: analysis
    requires:
      executables:
      - docker
      - runsc
      tools:
      - browser
    browser_fixtures:
      root:
        path: /
        content: "<!doctype html>\n<html>\n<body>\n  <main>\n    <h1>Relurpify Browser\
          \ Fixture</h1>\n    <p id=\"summary\">Fixture-backed browser coverage is\
          \ enabled.</p>\n  </main>\n</body>\n</html>\n"
    prompt: 'Use the browser tool to open the URL at browser_fixtures.urls.root, inspect
      the page, and answer with the page title text and the summary sentence. Do not
      modify any files.

      '
    expect:
      outcome:
        must_succeed: true
        output_contains:
        - Relurpify Browser Fixture
        - Fixture-backed browser coverage is enabled.
        no_file_changes: true
      benchmark:
        tools_expected:
        - browser
  - name: browser_interacts_with_fixture_form
    description: ReAct should drive a simple browser interaction flow against fixture
      content.
    task_type: analysis
    requires:
      executables:
      - docker
      - runsc
      tools:
      - browser
    browser_fixtures:
      root:
        path: /
        content: "<!doctype html>\n<html>\n<body>\n  <label for=\"name\">Name</label>\n\
          \  <input id=\"name\" />\n  <button id=\"submit\" onclick=\"document.querySelector('#result').textContent\
          \ = 'browser-ok';\">Submit</button>\n  <div id=\"result\">idle</div>\n</body>\n\
          </html>\n"
    prompt: 'Use the browser tool to open browser_fixtures.urls.root, type any short
      value into #name, click #submit, confirm the result div changed from idle to
      browser-ok, and summarize what happened. Do not modify any files.

      '
    expect:
      outcome:
        must_succeed: true
        output_contains:
        - browser-ok
        no_file_changes: true
      benchmark:
        tools_expected:
        - browser
