apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo-modes-smoke
  description: "Smoke coverage for Euclo non-default mode dispatch."
  owner: agent-platform
  tier: smoke
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: false
    timeout: 120s
  workspace:
    strategy: derived
    exclude:
      - .git/**
      - .gocache/**
      - .gomodcache/**
      - relurpify_cfg/test_runs/**
  models:
    - name: qwen2.5-coder:14b
      endpoint: http://localhost:11434
  recording:
    mode: off
  cases:
    - name: code_mode_smoke
      description: "Code mode should route into the implementation path without crashing."
      task_type: code_modification
      tags: [smoke, code]
      setup:
        files:
          - path: testsuite/fixtures/mode_code/hello.go
            content: |
              package modecode

              func Hello() string { return "hello" }
      prompt: "Change testsuite/fixtures/mode_code/hello.go so Hello returns 'hello world'."
      context:
        euclo.mode: code
      expect:
        must_succeed: true
        euclo:
          mode: code

    - name: debug_mode_smoke
      description: "Debug mode should route into the debug handler without crashing."
      task_type: code_modification
      tags: [smoke, debug]
      setup:
        files:
          - path: testsuite/fixtures/mode_debug/math.go
            content: |
              package modedebug

              func Divide(a, b int) int {
                return a / b
              }
          - path: testsuite/fixtures/mode_debug/math_test.go
            content: |
              package modedebug

              import "testing"

              func TestDivide(t *testing.T) {
                if Divide(4, 2) != 2 {
                  t.Fatal("divide failed")
                }
              }
      prompt: "Debug testsuite/fixtures/mode_debug/ so it handles invalid input safely."
      context:
        euclo.mode: debug
      expect:
        must_succeed: true
        euclo:
          mode: debug

    - name: review_mode_smoke
      description: "Review mode should route into the review handler without crashing."
      task_type: analysis
      tags: [smoke, review]
      setup:
        files:
          - path: testsuite/fixtures/mode_review/clean.go
            content: |
              package modereview

              func Clean() string { return "ok" }
      prompt: "Review testsuite/fixtures/mode_review/clean.go and report any issues. Do not modify any files."
      context:
        euclo.mode: review
      expect:
        must_succeed: true
        no_file_changes: true
        euclo:
          mode: review

    - name: planning_mode_smoke
      description: "Planning mode should route into the planning handler without crashing."
      task_type: analysis
      tags: [smoke, planning]
      setup:
        files:
          - path: testsuite/fixtures/mode_plan/api.go
            content: |
              package modeplan

              func Handle() string { return "ok" }
      prompt: "just plan it: add authentication to testsuite/fixtures/mode_plan/api.go"
      context:
        euclo.mode: planning
      expect:
        must_succeed: true
        no_file_changes: true
        euclo:
          mode: planning

    - name: chat_mode_smoke
      description: "Chat mode should route into the chat handler without crashing."
      task_type: analysis
      tags: [smoke, chat]
      setup:
        files:
          - path: testsuite/fixtures/mode_chat/notes.txt
            content: |
              The chat mode smoke test only needs a tiny workspace fixture.
      prompt: "Explain what the workspace fixture contains and how the mode dispatch works."
      context:
        euclo.mode: chat
      expect:
        must_succeed: true
        euclo:
          mode: chat
