apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: coding.modes
  description: Coverage for CodingAgent ask, debug, and docs execution modes.
  owner: agent-platform
  tier: stable
  quarantined: false
spec:
  agent_name: coding
  manifest: relurpify_cfg/agents/coding-go.yaml
  execution:
    profile: ci-live
    strict: true
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  cases:
  - name: ask_mode_read_only_summary
    task_type: analysis
    context:
      mode: ask
    overrides:
      allowed_capabilities:
      - name: file_read
        kind: tool
    prompt: Use file_read to inspect README.md, then summarize the project in 3 bullets.
      Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)relurpify
        no_file_changes: true
      security:
        tools_must_not_call:
        - file_write
      benchmark:
        tools_not_expected:
        - cli_go
        tools_expected:
        - file_read
  - name: debug_mode_diagnoses_failing_test
    task_type: analysis
    context:
      mode: debug
    setup:
      files:
      - path: testsuite/agenttest_fixtures/gosuite/mathutil/mathutil.go
        content: "package mathutil\n\nfunc Add(a, b int) int {\n\treturn a + b + 1\n\
          }\n"
      - path: testsuite/agenttest_fixtures/gosuite/mathutil/mathutil_test.go
        content: "package mathutil\n\nimport \"testing\"\n\nfunc TestAdd(t *testing.T)\
          \ {\n\tif Add(2, 2) != 4 {\n\t\tt.Fatalf(\"expected Add(2,2)=4\")\n\t}\n\
          }\n"
    overrides:
      allowed_capabilities:
      - name: cli_go
        kind: tool
    prompt: Run cli_go args ["test","./testsuite/agenttest_fixtures/gosuite/mathutil"]
      and explain the failure. Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)(fail|expected|Add)
        no_file_changes: true
      benchmark:
        tools_expected:
        - cli_go
  - name: docs_mode_updates_markdown_fixture
    task_type: code_modification
    context:
      mode: docs
      context_file_contents:
      - path: docs/agenttest-notes.md
        content: '# Agent Test Notes


          Initial line.

          '
    setup:
      files:
      - path: docs/agenttest-notes.md
        content: '# Agent Test Notes


          Initial line.

          '
    prompt: Append a new bullet '- Generated by docs mode.' to docs/agenttest-notes.md
      using file_write.
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - docs/agenttest-notes.md
      benchmark:
        tools_not_expected:
        - cli_go
        tools_expected:
        - file_write
