apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: coding.architect
  description: "Live architect-mode workflow-store coverage for the coding agent."
spec:
  agent_name: coding
  manifest: relurpify_cfg/agents/coding-go.yaml
  workspace:
    strategy: in_place
    exclude:
      - .git/**
      - .gocache/**
      - .gomodcache/**
      - relurpify_cfg/test_runs/**
  models:
    - name: qwen2.5-coder:14b
      endpoint: http://localhost:11434
  recording:
    mode: off
  cases:
    - name: architect_persists_workflow_state
      description: "Architect mode should execute a read-only task and persist workflow state in the external store."
      task_type: analysis
      context:
        mode: architect
      overrides:
        allowed_tools: ["file_read", "file_list", "search_grep"]
      prompt: "Use only the registered file_read tool to inspect README.md, then summarize the project in 3 bullets. Do not modify any source files."
      expect:
        must_succeed: true
        files_changed:
          - relurpify_cfg/sessions/workflow_state.db
        tool_calls_must_include:
          - file_read
        tool_calls_must_exclude:
          - file_write
