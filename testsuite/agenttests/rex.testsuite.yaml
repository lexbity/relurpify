apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: rex
  description: End-to-end smoke coverage for the rex named runtime without Nexus integration.
  owner: agent-platform
  tier: smoke
  quarantined: false
spec:
  agent_name: rex
  manifest: relurpify_cfg/agents/rex.yaml
  execution:
    profile: ci-live
    strict: true
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  cases:
  - name: rex_review_finds_issue
    description: Rex routes read-only review work and reports concrete findings.
    task_type: analysis
    setup:
      files:
      - path: testsuite/fixtures/rex_handler.go
        content: "package main\n\nimport (\n  \"database/sql\"\n  \"fmt\"\n  \"net/http\"\
          \n)\n\nfunc UserHandler(w http.ResponseWriter, r *http.Request) {\n  id\
          \ := r.URL.Query().Get(\"id\")\n  db, _ := sql.Open(\"sqlite3\", \"app.db\"\
          )\n  row := db.QueryRow(\"SELECT name FROM users WHERE id = '\" + id + \"\
          '\")\n  var name string\n  _ = row.Scan(&name)\n  fmt.Fprintf(w, \"Hello\
          \ %s\", name)\n}\n"
    context:
      edit_permitted: false
      context_file_contents:
      - path: testsuite/fixtures/rex_handler.go
        content: "package main\n\nimport (\n  \"database/sql\"\n  \"fmt\"\n  \"net/http\"\
          \n)\n\nfunc UserHandler(w http.ResponseWriter, r *http.Request) {\n  id\
          \ := r.URL.Query().Get(\"id\")\n  db, _ := sql.Open(\"sqlite3\", \"app.db\"\
          )\n  row := db.QueryRow(\"SELECT name FROM users WHERE id = '\" + id + \"\
          '\")\n  var name string\n  _ = row.Scan(&name)\n  fmt.Fprintf(w, \"Hello\
          \ %s\", name)\n}\n"
    prompt: Review testsuite/fixtures/rex_handler.go for security and correctness
      issues. Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)(sql.?injection|security|parameteri[sz]e|unsafe)
        no_file_changes: true
  - name: rex_planning_produces_staged_plan
    description: Rex routes planning work and returns a staged implementation plan.
    task_type: planning
    setup:
      files:
      - path: testsuite/fixtures/rex_config.go
        content: "package fixtures\n\ntype Config struct {\n  Host string\n  Port\
          \ int\n}\n"
    context:
      edit_permitted: false
      context_file_contents:
      - path: testsuite/fixtures/rex_config.go
        content: "package fixtures\n\ntype Config struct {\n  Host string\n  Port\
          \ int\n}\n"
    prompt: Create a design and implementation plan to add YAML config loading to
      testsuite/fixtures/rex_config.go. Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)(plan|step|stage|implementation)
        no_file_changes: true
  - name: rex_mutation_updates_fixture
    description: Rex routes mutation-capable work and performs a simple workspace
      edit.
    task_type: code_modification
    setup:
      files:
      - path: testsuite/agenttest_fixtures/hello.txt
        content: 'hello

          '
    context:
      edit_permitted: true
      mutation_allowed: true
      context_file_contents:
      - path: testsuite/agenttest_fixtures/hello.txt
        content: 'hello

          '
    prompt: Implement the requested patch by appending a new line containing 'DONE'
      to testsuite/agenttest_fixtures/hello.txt.
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/hello.txt
