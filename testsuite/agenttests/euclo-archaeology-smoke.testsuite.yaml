apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo-archaeology-smoke
  description: Smoke coverage for Euclo archaeology mode.
  owner: agent-platform
  tier: smoke
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: false
    timeout: 120s
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  recording:
    mode: "off"
  cases:
  - name: archaeology_explore_smoke
    description: Explore a small package and emit an exploration artifact.
    task_type: analysis
    tags:
    - smoke
    - archaeology
    - explore
    setup:
      files:
      - path: testsuite/fixtures/arch_smoke/types.go
        content: "package archsmoke\n\ntype Request struct {\n  ID string\n}\n"
      - path: testsuite/fixtures/arch_smoke/handler.go
        content: "package archsmoke\n\nfunc Handle(req Request) string {\n  return\
          \ req.ID\n}\n"
    prompt: 'Explore testsuite/fixtures/arch_smoke/ and produce an archaeology exploration
      artifact describing the package structure. Do not modify any files.

      '
    context:
      euclo.mode: archaeology
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
        euclo_mode: archaeology
      benchmark:
        euclo:
          artifacts_produced:
          - exploration
  - name: archaeology_plan_projection_smoke
    description: Compile a plan from a seeded archaeology workflow.
    task_type: analysis
    tags:
    - smoke
    - archaeology
    - plan
    context:
      workflow_id: wf-arch-smoke-plan
      euclo.mode: archaeology
    setup:
      files:
      - path: testsuite/fixtures/arch_smoke_plan/handler.go
        content: "package archsmokeplan\n\nfunc Handle(input string) string {\n  if\
          \ input == \"\" {\n    return \"empty\"\n  }\n  return input\n}\n"
      workflows:
      - workflow:
          workflow_id: wf-arch-smoke-plan
          task_type: analysis
          instruction: Add structured error handling to Handle
          status: running
        runs:
        - run_id: arch-smoke-plan-run
          status: running
        knowledge:
        - record_id: arch-smoke-plan-knowledge
          kind: fact
          title: Seeded exploration result
          content: 'Package archsmokeplan contains a single handler.go file with Handle(input
            string) that returns "empty" for blank input and echoes non-empty input.
            The next step is to add structured error handling and a validation branch.

            '
          status: accepted
    prompt: 'Using the seeded archaeology workflow, compile an implementation plan
      for testsuite/fixtures/arch_smoke_plan/handler.go. Do not modify any files.

      '
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
        euclo_mode: archaeology
      benchmark:
        euclo:
          artifacts_produced:
          - plan
  - name: archaeology_tension_detect_smoke
    description: Surface a simple inconsistency as a tension artifact.
    task_type: analysis
    tags:
    - smoke
    - archaeology
    - tension
    context:
      workflow_id: wf-arch-smoke-tension
      euclo.mode: archaeology
    setup:
      files:
      - path: testsuite/fixtures/arch_smoke_tension/api.go
        content: 'package archsmoketension


          func API() string { return "v1" }

          '
      - path: testsuite/fixtures/arch_smoke_tension/notes.txt
        content: 'The API should be v2 according to the rollout notes.

          '
      workflows:
      - workflow:
          workflow_id: wf-arch-smoke-tension
          task_type: analysis
          instruction: Detect and surface tensions in the API notes
          status: running
        runs:
        - run_id: arch-smoke-tension-run
          status: running
    prompt: 'Inspect testsuite/fixtures/arch_smoke_tension/ and surface any unresolved
      inconsistencies as archaeology tensions. Do not modify any files.

      '
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
        euclo_mode: archaeology
      benchmark:
        euclo:
          artifacts_produced:
          - tension
