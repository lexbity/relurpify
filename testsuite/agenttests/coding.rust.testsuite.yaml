apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: coding.rust
  description: "Rust-focused prompts for the coding agent across common development workflows."
spec:
  agent_name: coding
  manifest: relurpify_cfg/agents/coding-rust.yaml
  workspace:
    strategy: derived
    exclude:
      - .git/**
      - relurpify_cfg/test_runs/**
  models:
    - name: qwen2.5-coder:14b
      endpoint: http://localhost:11434
  cases:
    - name: easy_fix_bug_and_run_tests
      task_type: code_modification
      requires:
        executables: ["cargo"]
        tools: ["cli_cargo"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
            content: |
              pub fn add(a: i32, b: i32) -> i32 {
                  a + b + 1
              }

              #[cfg(test)]
              mod tests {
                  use super::*;

                  #[test]
                  fn test_add() {
                      assert_eq!(add(2, 2), 4);
                  }
              }
      overrides:
        allowed_tools: ["cli_cargo"]
      prompt: "Fix the failing tests in testsuite/agenttest_fixtures/rustsuite (do not change test expectations), then run cli_cargo args [\"test\"] with working_directory \"testsuite/agenttest_fixtures/rustsuite\"."
      expect:
        must_succeed: true
        files_changed:
          - testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        tool_calls_must_include:
          - cli_cargo
        tool_calls_must_exclude:
          - exec_run_tests
        max_tool_calls: 6
    - name: medium_add_mul_and_test
      task_type: code_modification
      requires:
        executables: ["cargo"]
        tools: ["cli_cargo"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
            content: |
              pub fn add(a: i32, b: i32) -> i32 {
                  a + b
              }

              #[cfg(test)]
              mod tests {
                  use super::*;

                  #[test]
                  fn test_add() {
                      assert_eq!(add(2, 2), 4);
                  }

                  #[test]
                  fn test_mul() {
                      assert_eq!(mul(3, 4), 12);
                  }
              }
      overrides:
        allowed_tools: ["cli_cargo"]
      prompt: "Implement mul(a: i32, b: i32) -> i32 in testsuite/agenttest_fixtures/rustsuite/src/lib.rs (do not change tests), then run cli_cargo args [\"test\"] with working_directory \"testsuite/agenttest_fixtures/rustsuite\"."
      expect:
        must_succeed: true
        files_changed:
          - testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        tool_calls_must_include:
          - cli_cargo
        tool_calls_must_exclude:
          - exec_run_tests
    - name: compile_error_fix_and_check
      task_type: code_modification
      requires:
        executables: ["cargo"]
        tools: ["cli_cargo"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
            content: |
              pub fn add(a: i32, b: i32) -> i32 {
                  format!("{}", a + b)
              }
      overrides:
        allowed_tools: ["cli_cargo"]
      prompt: "Fix the compile error in testsuite/agenttest_fixtures/rustsuite/src/lib.rs, then run cli_cargo args [\"check\"] with working_directory \"testsuite/agenttest_fixtures/rustsuite\"."
      expect:
        must_succeed: true
        files_changed:
          - testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        tool_calls_must_include:
          - cli_cargo
    - name: multi_file_module_fix_and_test
      task_type: code_modification
      requires:
        executables: ["cargo"]
        tools: ["cli_cargo"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
            content: |
              mod math;

              pub use math::add;

              #[cfg(test)]
              mod tests {
                  use super::*;

                  #[test]
                  fn test_add() {
                      assert_eq!(add(2, 2), 4);
                  }

                  #[test]
                  fn test_mul() {
                      assert_eq!(mul(3, 4), 12);
                  }
              }
          - path: testsuite/agenttest_fixtures/rustsuite/src/math.rs
            content: |
              pub fn add(a: i32, b: i32) -> i32 {
                  a + b
              }
      overrides:
        allowed_tools: ["cli_cargo"]
      prompt: "Implement mul(a: i32, b: i32) -> i32 in testsuite/agenttest_fixtures/rustsuite/src/math.rs and export it from testsuite/agenttest_fixtures/rustsuite/src/lib.rs without changing tests, then run cli_cargo args [\"test\"] with working_directory \"testsuite/agenttest_fixtures/rustsuite\"."
      expect:
        must_succeed: true
        files_changed:
          - testsuite/agenttest_fixtures/rustsuite/src/lib.rs
          - testsuite/agenttest_fixtures/rustsuite/src/math.rs
        tool_calls_must_include:
          - cli_cargo
    - name: verify_already_correct_without_edits
      task_type: analysis
      requires:
        executables: ["cargo"]
        tools: ["cli_cargo"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
            content: |
              pub fn add(a: i32, b: i32) -> i32 {
                  a + b
              }

              #[cfg(test)]
              mod tests {
                  use super::*;

                  #[test]
                  fn test_add() {
                      assert_eq!(add(2, 2), 4);
                  }
              }
      overrides:
        allowed_tools: ["cli_cargo"]
      prompt: "Run cli_cargo args [\"test\"] with working_directory \"testsuite/agenttest_fixtures/rustsuite\" and confirm whether the crate is already correct. Do not modify any files."
      expect:
        must_succeed: true
        no_file_changes: true
        output_regex:
          - "(?i)(correct|passes|ok|1 passed)"
        tool_calls_must_include:
          - cli_cargo
    - name: debug_explain_failing_test_without_edits
      task_type: analysis
      requires:
        executables: ["cargo"]
        tools: ["cli_cargo"]
      context:
        mode: debug
      setup:
        files:
          - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
            content: |
              pub fn add(a: i32, b: i32) -> i32 {
                  a + b + 1
              }

              #[cfg(test)]
              mod tests {
                  use super::*;

                  #[test]
                  fn test_add() {
                      assert_eq!(add(2, 2), 4);
                  }
              }
      overrides:
        allowed_tools: ["cli_cargo"]
      prompt: "Run cli_cargo args [\"test\"] with working_directory \"testsuite/agenttest_fixtures/rustsuite\" and explain the failure. Do not modify any files."
      expect:
        must_succeed: true
        no_file_changes: true
        output_regex:
          - "(?i)(assert|failed|panic|test_add)"
        tool_calls_must_include:
          - cli_cargo
        max_tool_calls: 4
