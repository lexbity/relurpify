apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: coding.rust
  description: Rust-focused prompts for the coding agent across common development
    workflows.
  owner: agent-platform
  tier: stable
  quarantined: false
spec:
  agent_name: coding
  manifest: relurpify_cfg/agents/coding-rust.yaml
  execution:
    profile: ci-live
    strict: true
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  cases:
  - name: easy_fix_bug_and_run_tests
    task_type: code_modification
    requires:
      executables:
      - cargo
      tools:
      - cli_cargo
    setup:
      files:
      - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        content: "pub fn add(a: i32, b: i32) -> i32 {\n    a + b + 1\n}\n\n#[cfg(test)]\n\
          mod tests {\n    use super::*;\n\n    #[test]\n    fn test_add() {\n   \
          \     assert_eq!(add(2, 2), 4);\n    }\n}\n"
    overrides:
      allowed_capabilities:
      - name: cli_cargo
        kind: tool
    prompt: Fix the failing tests in testsuite/agenttest_fixtures/rustsuite (do not
      change test expectations), then run cli_cargo args ["test"] with working_directory
      "testsuite/agenttest_fixtures/rustsuite".
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/rustsuite/src/lib.rs
      benchmark:
        tools_expected:
        - cli_cargo
  - name: medium_add_mul_and_test
    task_type: code_modification
    requires:
      executables:
      - cargo
      tools:
      - cli_cargo
    setup:
      files:
      - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        content: "pub fn add(a: i32, b: i32) -> i32 {\n    a + b\n}\n\n#[cfg(test)]\n\
          mod tests {\n    use super::*;\n\n    #[test]\n    fn test_add() {\n   \
          \     assert_eq!(add(2, 2), 4);\n    }\n\n    #[test]\n    fn test_mul()\
          \ {\n        assert_eq!(mul(3, 4), 12);\n    }\n}\n"
    overrides:
      allowed_capabilities:
      - name: cli_cargo
        kind: tool
    prompt: 'Implement mul(a: i32, b: i32) -> i32 in testsuite/agenttest_fixtures/rustsuite/src/lib.rs
      (do not change tests), then run cli_cargo args ["test"] with working_directory
      "testsuite/agenttest_fixtures/rustsuite".'
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/rustsuite/src/lib.rs
      benchmark:
        tools_expected:
        - cli_cargo
  - name: compile_error_fix_and_check
    task_type: code_modification
    requires:
      executables:
      - cargo
      tools:
      - cli_cargo
    context:
      context_file_contents:
      - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        content: "pub fn add(a: i32, b: i32) -> i32 {\n    format!(\"{}\", a + b)\n\
          }\n"
    setup:
      files:
      - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        content: "pub fn add(a: i32, b: i32) -> i32 {\n    format!(\"{}\", a + b)\n\
          }\n"
    overrides:
      allowed_capabilities:
      - name: cli_cargo
        kind: tool
    prompt: Fix the compile error in testsuite/agenttest_fixtures/rustsuite/src/lib.rs
      while keeping add(a, b) -> i32, then run cli_cargo args ["check"] with working_directory
      "testsuite/agenttest_fixtures/rustsuite".
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/rustsuite/src/lib.rs
      benchmark:
        tools_expected:
        - cli_cargo
  - name: multi_file_module_fix_and_test
    task_type: code_modification
    requires:
      executables:
      - cargo
      tools:
      - cli_cargo
    context:
      context_file_contents:
      - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        content: "mod math;\n\npub use math::add;\n\n#[cfg(test)]\nmod tests {\n \
          \   use super::*;\n\n    #[test]\n    fn test_add() {\n        assert_eq!(add(2,\
          \ 2), 4);\n    }\n\n    #[test]\n    fn test_mul() {\n        assert_eq!(mul(3,\
          \ 4), 12);\n    }\n}\n"
      - path: testsuite/agenttest_fixtures/rustsuite/src/math.rs
        content: "pub fn add(a: i32, b: i32) -> i32 {\n    a + b\n}\n"
    setup:
      files:
      - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        content: "mod math;\n\npub use math::add;\n\n#[cfg(test)]\nmod tests {\n \
          \   use super::*;\n\n    #[test]\n    fn test_add() {\n        assert_eq!(add(2,\
          \ 2), 4);\n    }\n\n    #[test]\n    fn test_mul() {\n        assert_eq!(mul(3,\
          \ 4), 12);\n    }\n}\n"
      - path: testsuite/agenttest_fixtures/rustsuite/src/math.rs
        content: "pub fn add(a: i32, b: i32) -> i32 {\n    a + b\n}\n"
    overrides:
      allowed_capabilities:
      - name: cli_cargo
        kind: tool
    prompt: 'Implement mul(a: i32, b: i32) -> i32 in testsuite/agenttest_fixtures/rustsuite/src/math.rs,
      preserve the existing add implementation/export, and export mul from testsuite/agenttest_fixtures/rustsuite/src/lib.rs
      without changing tests. Then run cli_cargo args ["test"] with working_directory
      "testsuite/agenttest_fixtures/rustsuite".'
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        - testsuite/agenttest_fixtures/rustsuite/src/math.rs
      benchmark:
        tools_expected:
        - cli_cargo
  - name: verify_already_correct_without_edits
    task_type: analysis
    requires:
      executables:
      - cargo
      tools:
      - cli_cargo
    setup:
      files:
      - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        content: "pub fn add(a: i32, b: i32) -> i32 {\n    a + b\n}\n\n#[cfg(test)]\n\
          mod tests {\n    use super::*;\n\n    #[test]\n    fn test_add() {\n   \
          \     assert_eq!(add(2, 2), 4);\n    }\n}\n"
    overrides:
      allowed_capabilities:
      - name: cli_cargo
        kind: tool
    prompt: Run cli_cargo args ["test"] with working_directory "testsuite/agenttest_fixtures/rustsuite"
      and confirm whether the crate is already correct. Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)(correct|passes|ok|1 passed)
        no_file_changes: true
      benchmark:
        tools_expected:
        - cli_cargo
  - name: debug_explain_failing_test_without_edits
    task_type: analysis
    requires:
      executables:
      - cargo
      tools:
      - cli_cargo
    context:
      mode: debug
    setup:
      files:
      - path: testsuite/agenttest_fixtures/rustsuite/src/lib.rs
        content: "pub fn add(a: i32, b: i32) -> i32 {\n    a + b + 1\n}\n\n#[cfg(test)]\n\
          mod tests {\n    use super::*;\n\n    #[test]\n    fn test_add() {\n   \
          \     assert_eq!(add(2, 2), 4);\n    }\n}\n"
    overrides:
      allowed_capabilities:
      - name: cli_cargo
        kind: tool
    prompt: Run cli_cargo args ["test"] with working_directory "testsuite/agenttest_fixtures/rustsuite"
      and explain the failure. Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)(assert|failed|panic|test_add)
        no_file_changes: true
      benchmark:
        tools_expected:
        - cli_cargo
