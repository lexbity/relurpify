apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo.baseline.debug
  description: Capability-baseline Euclo debug coverage for investigate and verification-repair
    paths.
  owner: agent-platform
  tier: stable
  classification: capability
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: true
    timeout: 90s
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
    ignore_changes:
    - relurpify_cfg/logs/skills.log
    - relurpify_cfg/artifacts/euclo/deferred/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  recording:
    mode: "off"
  cases:
  - name: debug_investigate_baseline
    description: Debug investigate should localize the failure without changing files.
    task_type: analysis
    tags:
    - baseline
    - capability-baseline
    - debug
    - investigate
    - level:1
    setup:
      files:
      - path: testsuite/fixtures/euclo_baseline_debug/server.go
        content: "package euclobaselinedebug\n\nfunc GetUser(id string) string {\n\
          \  var users map[string]string\n  return users[id]\n}\n"
    prompt: "panic: runtime error: index out of range\ngoroutine 1 [running]:\neuclobaselinedebug.GetUser(...)\n\
      \  testsuite/fixtures/euclo_baseline_debug/server.go:4\nIdentify the likely\
      \ root cause and where it is localized. Do not modify files.\n"
    context:
      euclo.mode: debug
      context_file_contents:
      - path: testsuite/fixtures/euclo_baseline_debug/server.go
        content: "package euclobaselinedebug\n\nfunc GetUser(id string) string {\n\
          \  var users map[string]string\n  return users[id]\n}\n"
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
        euclo_mode: debug
      security:
        tools_must_not_call:
        - file_write
      benchmark:
        tools_not_expected:
        - go_test
        tools_expected:
        - file_read
        - file_search
        euclo:
          behavior_family: stale_assumption_detection
          primary_relurpic_capability: euclo:debug.investigate-repair
          supporting_relurpic_capabilities:
          - euclo:debug.root-cause
          - euclo:debug.localization
          recipe_ids:
          - debug.investigate-repair.reproduce
  - name: debug_simple_repair_baseline
    description: Baseline validation of euclo:debug.repair.simple in isolation.
    task_type: code_modification
    tags:
    - baseline
    - capability-baseline
    - debug
    - simple-repair
    - level:1
    setup:
      files:
      - path: testsuite/fixtures/euclo_baseline_debug/counter.go
        content: "package euclobaselinedebug\n\nfunc Increment(n int) int {\n  return\
          \ n - 1\n}\n"
      - path: testsuite/fixtures/euclo_baseline_debug/counter_test.go
        content: "package euclobaselinedebug\n\nimport \"testing\"\n\nfunc TestIncrement(t\
          \ *testing.T) {\n  if Increment(3) != 4 {\n    t.Fatalf(\"got %d, want 4\"\
          , Increment(3))\n  }\n}\n"
    prompt: Fix Increment in testsuite/fixtures/euclo_baseline_debug/counter.go —
      it subtracts instead of adding.
    context:
      euclo.mode: debug
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/fixtures/euclo_baseline_debug/counter.go
        files_contain:
        - path: testsuite/fixtures/euclo_baseline_debug/counter.go
          contains:
          - return n + 1
        euclo_mode: debug
      benchmark:
        tools_expected:
        - file_read
        - file_write
        - go_test
        euclo:
          behavior_family: stale_assumption_detection
          primary_relurpic_capability: euclo:debug.repair.simple
          recipe_ids:
          - debug.repair-simple.read
          - debug.repair-simple.edit
  - name: debug_investigate_flaw_surface_baseline
    description: Baseline validation that euclo:debug.investigate-repair surfaces
      flaw-surface findings for anti-patterns.
    task_type: analysis
    tags:
    - baseline
    - capability-baseline
    - debug
    - investigate
    - flaw-surface
    - level:1
    setup:
      files:
      - path: testsuite/fixtures/euclo_baseline_debug/server.go
        content: "package euclobaselinedebug\n\nfunc GetUser(id string) string {\n\
          \  var users map[string]string\n  return users[id]\n}\n"
    prompt: 'The GetUser function has a nil map write issue - the users map is not
      initialized before use.

      Investigate and identify the flaw. Do not modify files.

      '
    context:
      euclo.mode: debug
      context_file_contents:
      - path: testsuite/fixtures/euclo_baseline_debug/server.go
        content: "package euclobaselinedebug\n\nfunc GetUser(id string) string {\n\
          \  var users map[string]string\n  return users[id]\n}\n"
    expect:
      state_key_not_empty:
      - euclo.review_findings
      outcome:
        must_succeed: true
        no_file_changes: true
        euclo_mode: debug
      security:
        tools_must_not_call:
        - file_write
      benchmark:
        tools_not_expected:
        - go_test
        tools_expected:
        - file_read
        - file_search
        euclo:
          behavior_family: stale_assumption_detection
          primary_relurpic_capability: euclo:debug.investigate-repair
          supporting_relurpic_capabilities:
          - euclo:debug.root-cause
          - euclo:debug.flaw-surface
          recipe_ids:
          - debug.investigate-repair.reproduce
  - name: debug_verification_repair_baseline
    description: Debug repair should fix the implementation and verify the result.
    task_type: code_modification
    tags:
    - baseline
    - capability-baseline
    - debug
    - verification-repair
    - level:2
    setup:
      files:
      - path: testsuite/fixtures/euclo_baseline_debug/abs.go
        content: "package euclobaselinedebug\n\nfunc Abs(v int) int {\n  if v < 0\
          \ {\n    return v\n  }\n  return v\n}\n"
      - path: testsuite/fixtures/euclo_baseline_debug/abs_test.go
        content: "package euclobaselinedebug\n\nimport \"testing\"\n\nfunc TestAbs(t\
          \ *testing.T) {\n  if Abs(-3) != 3 {\n    t.Fatalf(\"got %d, want 3\", Abs(-3))\n\
          \  }\n}\n"
    prompt: Fix testsuite/fixtures/euclo_baseline_debug/abs.go so Abs returns a positive
      value for negative inputs.
    context:
      euclo.mode: debug
      context_file_contents:
      - path: testsuite/fixtures/euclo_baseline_debug/abs.go
        content: "package euclobaselinedebug\n\nfunc Abs(v int) int {\n  if v < 0\
          \ {\n    return v\n  }\n  return v\n}\n"
      - path: testsuite/fixtures/euclo_baseline_debug/abs_test.go
        content: "package euclobaselinedebug\n\nimport \"testing\"\n\nfunc TestAbs(t\
          \ *testing.T) {\n  if Abs(-3) != 3 {\n    t.Fatalf(\"got %d, want 3\", Abs(-3))\n\
          \  }\n}\n"
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/fixtures/euclo_baseline_debug/abs.go
        files_contain:
        - path: testsuite/fixtures/euclo_baseline_debug/abs.go
          contains:
          - return -v
        euclo_mode: debug
      benchmark:
        tools_expected:
        - file_read
        - file_write
        - go_test
        euclo:
          behavior_family: stale_assumption_detection
          primary_relurpic_capability: euclo:debug.investigate-repair
          supporting_relurpic_capabilities:
          - euclo:debug.root-cause
          - euclo:debug.verification-repair
          recipe_ids:
          - debug.investigate-repair.reproduce
