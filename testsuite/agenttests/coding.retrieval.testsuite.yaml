apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: coding.retrieval
  description: Retrieval- and semantic-search-oriented prompts for the coding agent.
  owner: agent-platform
  tier: stable
  quarantined: false
spec:
  agent_name: coding
  manifest: relurpify_cfg/agents/coding-go.yaml
  execution:
    profile: ci-live
    strict: true
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  cases:
  - name: ask_mode_semantic_search_retrieval_docs
    task_type: analysis
    context:
      mode: ask
    overrides:
      allowed_capabilities:
      - name: search_semantic
        kind: tool
      - name: file_read
        kind: tool
    prompt: Use search_semantic to find the retrieval architecture documentation for
      'durable retrieval subsystem', read the most relevant file, and summarize the
      subsystem in 3 bullets. Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)retrieval
        - (?i)(document|chunk|index|memory)
        no_file_changes: true
      security:
        tools_must_not_call:
        - file_write
      benchmark:
        tools_expected:
        - search_semantic
        - file_read
  - name: ask_mode_find_similar_retrieval_service_implementations
    task_type: analysis
    context:
      mode: ask
    overrides:
      allowed_capabilities:
      - name: search_find_similar
        kind: tool
    prompt: Use search_find_similar with a snippet resembling 'func RetrievalService()
      retrieval.RetrieverService' to find similar implementations in the repository,
      then name the two most relevant files and explain what each one provides. Do
      not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)hybrid memory store
        - (?i)sqlite_workflow_state_store
        no_file_changes: true
      security:
        tools_must_not_call:
        - file_write
      benchmark:
        tools_expected:
        - search_find_similar
  - name: debug_mode_semantic_search_retrieval_pipeline
    task_type: analysis
    context:
      mode: debug
    overrides:
      allowed_capabilities:
      - name: search_semantic
        kind: tool
      - name: file_read
        kind: tool
    prompt: Use search_semantic to find where workflow retrieval is applied in agent
      execution, inspect the most relevant implementation files, and explain the current
      retrieval path through the agents. Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)workflow_retrieval
        - (?i)(architect|pipeline|planner)
        no_file_changes: true
      benchmark:
        tools_expected:
        - search_semantic
        - file_read
