apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo.debug
  description: Euclo debug mode interaction flow tests.
  owner: agent-platform
  tier: stable
  classification: journey
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: true
    timeout: 120s
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  recording:
    mode: 'off'
  cases:
  - name: failing_test_investigation
    description: "Debug mode for a failing test \u2014 investigate then fix."
    task_type: code_modification
    tags:
    - coverage-matrix
    - debug
    - reproduce_localize_patch
    - level:1
    setup:
      files:
      - path: testsuite/agenttest_fixtures/gosuite/debug_divide/divide.go
        content: "package debug_divide\n\nfunc Divide(a, b float64) float64 {\n  return a + b\n}\n"
    prompt: Debug why TestDivide is failing and fix the issue.
    context:
      context_file_contents:
      - path: testsuite/agenttest_fixtures/gosuite/debug_divide/divide.go
        content: "package debug_divide\n\nfunc Divide(a, b float64) float64 {\n  return a + b\n}\n"
      extensions:
        euclo:
          mode: debug
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/gosuite/debug_divide/divide.go
        verify:
          steps:
          - tool: go_test
            args:
              package: ./testsuite/agenttest_fixtures/gosuite/debug_divide
        extensions:
          euclo:
            mode: debug
      benchmark:
        extensions:
          euclo:
            profile: reproduce_localize_patch
  - name: error_with_stacktrace
    description: Debug auto-classified from error text in instruction.
    tags:
    - level:1
    task_type: code_modification
    setup:
      files:
      - path: testsuite/agenttest_fixtures/gosuite/debug_server/server.go
        content: "package debug_server\n\nfunc GetUser(id string) string {\n  var users map[string]string\n  return users[id]\n\
          }\n"
    prompt: "panic: assignment to entry in nil map\ngoroutine 1 [running]:\nmain.GetUser(0x0)\n  testsuite/agenttest_fixtures/gosuite/debug_server/server.go:4\n\
      Fix the nil map access in GetUser.\n"
    context:
      context_file_contents:
      - path: testsuite/agenttest_fixtures/gosuite/debug_server/server.go
        content: "package debug_server\n\nfunc GetUser(id string) string {\n  var users map[string]string\n  return users[id]\n\
          }\n"
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/gosuite/debug_server/server.go
        verify:
          steps:
          - tool: go_test
            args:
              package: ./testsuite/agenttest_fixtures/gosuite/debug_server
        extensions:
          euclo:
            mode: debug
      benchmark:
        extensions:
          euclo:
            frame_kinds_emitted:
            - result
  - name: debug_from_incident_log
    description: "4.3 artifact-mediated: simulate log output + stack trace inline \u2014 no clean repro steps."
    task_type: code_modification
    tags:
    - stable
    - debug
    - artifact-mediated
    - level:3
    setup:
      files:
      - path: testsuite/agenttest_fixtures/gosuite/debug_panic_handler/panic_handler.go
        content: "package debug_panic_handler\n\nfunc ProcessItems(items []string) string {\n  return items[0]\n}\n"
    prompt: "Incident log from production (2026-03-31 02:14:07 UTC):\ngoroutine 1 [running]:\npanic: runtime error: index\
      \ out of range [0] with length 0\ngithub.com/example/app.ProcessItems(...)\n  testsuite/agenttest_fixtures/gosuite/debug_panic_handler/panic_handler.go:4\n\
      Customers reported intermittent \"500 Internal Server Error\" responses.\nThe function is called with the result of\
      \ a database query that can return an empty slice.\nFix the root cause in testsuite/agenttest_fixtures/gosuite/debug_panic_handler/panic_handler.go.\n"
    context:
      context_file_contents:
      - path: testsuite/agenttest_fixtures/gosuite/debug_panic_handler/panic_handler.go
        content: "package debug_panic_handler\n\nfunc ProcessItems(items []string) string {\n  return items[0]\n}\n"
      extensions:
        euclo:
          mode: debug
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/gosuite/debug_panic_handler/panic_handler.go
        verify:
          steps:
          - tool: go_test
            args:
              package: ./testsuite/agenttest_fixtures/gosuite/debug_panic_handler
        extensions:
          euclo:
            mode: debug
