apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: eternal
  description: "End-to-end smoke coverage for the eternal agent."
  owner: agent-platform
  tier: smoke
  quarantined: false
spec:
  agent_name: eternal
  manifest: relurpify_cfg/agents/eternal.yaml
  execution:
    profile: ci-live
    strict: true
  workspace:
    strategy: derived
    exclude:
      - .git/**
      - .gocache/**
      - .gomodcache/**
      - relurpify_cfg/test_runs/**
  models:
    - name: qwen2.5-coder:14b
      endpoint: http://localhost:11434
  cases:
    - name: single_cycle_exact_reply
      task_type: analysis
      context:
        eternal.max_cycles: 1
      prompt: "Reply with the single word READY."
      expect:
        must_succeed: true
        no_file_changes: true
        output_regex:
          - (?i)ready
