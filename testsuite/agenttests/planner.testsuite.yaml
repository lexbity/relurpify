apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: planner
  description: End-to-end smoke coverage for the planner agent.
  owner: agent-platform
  tier: smoke
  quarantined: false
spec:
  agent_name: planner
  manifest: relurpify_cfg/agents/planner.yaml
  execution:
    profile: ci-live
    strict: true
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  cases:
  - name: summarize_readme_with_read_only_plan
    task_type: analysis
    overrides:
      allowed_capabilities:
      - name: file_read
        kind: tool
    prompt: Use only file_read to inspect README.md, then summarize the project in
      3 bullets. Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)relurpify
        no_file_changes: true
      benchmark:
        tools_expected:
        - file_read
  - name: plan_then_edit
    tags:
    - smoke
    - plan-execute
    task_type: code_modification
    setup:
      files:
      - path: testsuite/agenttest_fixtures/planner_edit_target.txt
        content: 'placeholder text

          '
    overrides:
      allowed_capabilities:
      - name: file_read
        kind: tool
      - name: file_write
        kind: tool
    prompt: 'Emit a short plan (one or two steps) describing how to replace the content
      of testsuite/agenttest_fixtures/planner_edit_target.txt with the text "PLANNED
      EDIT". Then execute the plan using file_write. Do not modify any other files.

      '
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/planner_edit_target.txt
      benchmark:
        tools_expected:
        - file_write
  - name: multi_file_plan
    tags:
    - stable
    - multi-file
    task_type: code_modification
    setup:
      files:
      - path: testsuite/agenttest_fixtures/planner_multi_a.txt
        content: 'version: 1

          '
      - path: testsuite/agenttest_fixtures/planner_multi_b.txt
        content: 'version: 1

          '
    overrides:
      allowed_capabilities:
      - name: file_read
        kind: tool
      - name: file_write
        kind: tool
    prompt: 'Create a plan to update both testsuite/agenttest_fixtures/planner_multi_a.txt
      and testsuite/agenttest_fixtures/planner_multi_b.txt so each contains "version:
      2". Execute the plan and verify both files have been updated.

      '
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/planner_multi_a.txt
        - testsuite/agenttest_fixtures/planner_multi_b.txt
      benchmark:
        tools_expected:
        - file_write
  - name: plan_step_recovery
    tags:
    - stable
    - error-recovery
    task_type: analysis
    overrides:
      allowed_capabilities:
      - name: file_read
        kind: tool
    prompt: 'Plan two steps: step 1 — read testsuite/agenttest_fixtures/nonexistent_plan_file.txt
      (this file does not exist; the step should fail gracefully). Step 2 — read README.md
      and summarize the project in 2 bullets. Execute both steps. Do not modify any
      files.

      '
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)relurpify
        no_file_changes: true
  - name: read_only_plan
    tags:
    - smoke
    - analysis
    task_type: analysis
    overrides:
      allowed_capabilities:
      - name: file_read
        kind: tool
    prompt: 'Create a read-only analysis plan for README.md: one step to read it and
      one step to summarize the project goals. Execute the plan and return the summary.
      Do not modify any files.

      '
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)relurpify
        no_file_changes: true
      benchmark:
        tools_expected:
        - file_read
