apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo.archaeology
  description: 'Euclo archaeology mode: explore → compile-plan → implement-plan capability
    chain.'
  owner: agent-platform
  tier: stable
  classification: journey
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: false
    timeout: 180s
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  recording:
    mode: "off"
  cases:
  - name: explore_codebase_pattern
    description: 'Archaeology explore: produces an exploration artifact from a 3-file
      Go package.'
    task_type: analysis
    tags:
    - coverage-matrix
    - archaeology
    - explore
    - level:2
    setup:
      files:
      - path: testsuite/fixtures/arch_pkg/types.go
        content: "package archpkg\n\ntype Request struct {\n  ID      string\n  Payload\
          \ []byte\n}\n\ntype Response struct {\n  Status  int\n  Message string\n\
          }\n"
      - path: testsuite/fixtures/arch_pkg/handler.go
        content: "package archpkg\n\nimport \"fmt\"\n\nfunc Handle(req Request) Response\
          \ {\n  if len(req.Payload) == 0 {\n    return Response{Status: 400, Message:\
          \ \"empty payload\"}\n  }\n  return Response{Status: 200, Message: fmt.Sprintf(\"\
          handled %s\", req.ID)}\n}\n"
      - path: testsuite/fixtures/arch_pkg/handler_test.go
        content: "package archpkg\n\nimport \"testing\"\n\nfunc TestHandle(t *testing.T)\
          \ {\n  r := Handle(Request{ID: \"test\", Payload: []byte(\"data\")})\n \
          \ if r.Status != 200 {\n    t.Errorf(\"got %d, want 200\", r.Status)\n \
          \ }\n}\n"
    prompt: 'Explore the Go package in testsuite/fixtures/arch_pkg/ and produce an
      exploration artifact describing its structure, types, and relationships. Do
      not modify any files.

      '
    context:
      euclo.mode: archaeology
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
      benchmark:
        euclo:
          artifacts_produced:
          - exploration
  - name: compile_plan_from_exploration
    description: 'Archaeology compile-plan: builds a structured plan from prior exploration
      results seeded into pipeline.explore state. The exploration artifact is pre-seeded
      so the compile-plan capability receives concrete evidence without requiring a
      prior explore turn.'
    task_type: analysis
    tags:
    - stable
    - archaeology
    - compile-plan
    - level:3
    timeout: 180s
    context:
      workflow_id: wf-arch-compile-plan
      euclo.mode: archaeology
    setup:
      files:
      - path: testsuite/fixtures/arch_pkg/types.go
        content: "package archpkg\n\ntype Request struct {\n  ID      string\n  Payload\
          \ []byte\n}\n\ntype Response struct {\n  Status  int\n  Message string\n\
          }\n"
      - path: testsuite/fixtures/arch_pkg/handler.go
        content: "package archpkg\n\nimport \"fmt\"\n\nfunc Handle(req Request) Response\
          \ {\n  if len(req.Payload) == 0 {\n    return Response{Status: 400, Message:\
          \ \"empty payload\"}\n  }\n  return Response{Status: 200, Message: fmt.Sprintf(\"\
          handled %s\", req.ID)}\n}\n"
      workflows:
      - workflow:
          workflow_id: wf-arch-compile-plan
          task_type: analysis
          instruction: Add error wrapping to the Handle function
          status: running
        runs:
        - run_id: arch-explore-run
          status: running
      state_keys:
        pipeline.explore:
          package: archpkg
          workspace: testsuite/fixtures/arch_pkg
          files:
          - path: types.go
            summary: Defines Request (ID string, Payload []byte) and Response (Status
              int, Message string)
          - path: handler.go
            summary: Implements Handle(req Request) Response; returns Status 400 for
              empty payload, Status 200 otherwise using fmt.Sprintf
          findings: No error wrapping is present in the Handle function. The function
            uses a plain string return for error cases rather than a typed error return.
          summary: Explored 2 files in archpkg. Handle function lacks structured error
            wrapping. Target change is to add fmt.Errorf-based error handling.
          exploration_id: arch-explore-run
    prompt: 'Using the prior exploration results for testsuite/fixtures/arch_pkg/,
      compile an implementation plan for adding structured error wrapping to the Handle
      function. Do not modify any files.

      '
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
      benchmark:
        euclo:
          artifacts_produced:
          - plan
  - name: implement_from_plan
    description: 'Archaeology implement-plan: applies file edits from a seeded compiled
      plan.'
    task_type: code_modification
    tags:
    - stable
    - archaeology
    - implement-plan
    - level:2
    timeout: 180s
    context:
      workflow_id: wf-arch-implement
      euclo.mode: archaeology
    setup:
      files:
      - path: testsuite/fixtures/arch_impl/handler.go
        content: "package archimpl\n\nfunc Handle(payload []byte) string {\n  if len(payload)\
          \ == 0 {\n    return \"error: empty\"\n  }\n  return \"ok\"\n}\n"
      workflows:
      - workflow:
          workflow_id: wf-arch-implement
          task_type: code_modification
          instruction: Add a validation helper to the handler
          status: running
        runs:
        - run_id: arch-plan-run
          status: running
        knowledge:
        - record_id: arch-plan-result
          kind: fact
          title: Compiled plan
          content: 'Plan: add a validate(payload []byte) bool helper to testsuite/fixtures/arch_impl/handler.go
            that returns false when payload is nil or empty. Update Handle to call
            validate and return "error: invalid" when validation fails.

            '
          status: accepted
    prompt: 'Apply the compiled plan from the workflow knowledge: add a validate helper
      to testsuite/fixtures/arch_impl/handler.go as described. Use file_write to apply
      the change.

      '
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/fixtures/arch_impl/handler.go
  - name: archaeology_resume
    description: 'Archaeology resume: continues from a seeded exploration phase checkpoint.
      Prior exploration is injected into pipeline.explore state so compile-plan receives
      concrete evidence without requiring a new explore turn.'
    task_type: analysis
    tags:
    - stable
    - archaeology
    - resume
    - level:3
    timeout: 180s
    context:
      workflow_id: wf-arch-resume
      euclo.mode: archaeology
      euclo.interaction_state:
        mode: archaeology
        current_phase: compile-plan
        phases_executed:
        - explore
        phase_states:
          explore.done: true
    setup:
      files:
      - path: testsuite/fixtures/arch_resume/store.go
        content: 'package archresume


          type Store struct{ data map[string]string }


          func (s *Store) Set(k, v string) { s.data[k] = v }

          func (s *Store) Get(k string) string { return s.data[k] }

          '
      workflows:
      - workflow:
          workflow_id: wf-arch-resume
          task_type: analysis
          instruction: Explore and plan improvements to the Store type
          status: running
        runs:
        - run_id: arch-resume-run
          status: running
      state_keys:
        pipeline.explore:
          package: archresume
          workspace: testsuite/fixtures/arch_resume
          files:
          - path: store.go
            summary: Defines Store struct with a string-to-string map; Set writes without
              nil-check; Get returns empty string for missing keys with no ok bool
          findings: Store.Set has no nil guard on s.data before writing. Store.Get
            returns the zero value for missing keys and cannot distinguish between
            a missing key and an empty-string value. No Delete method exists. Improvement
            opportunities are to initialise data lazily, change Get to return (string,
            bool), and add a Delete method.
          summary: Explored 1 file in archresume. Store type has three improvement
            opportunities identified during explore phase.
          exploration_id: arch-resume-run
    prompt: 'Resume the archaeology session for testsuite/fixtures/arch_resume/store.go.
      The exploration phase is complete. Continue with compile-plan: generate a structured
      improvement plan from the prior exploration. Do not modify any files.

      '
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
      benchmark:
        euclo:
          artifacts_produced:
          - plan
  - name: archaeology_recovery
    description: 'Archaeology recovery: implement-plan with a broken step triggers
      recovery strategy.'
    task_type: code_modification
    tags:
    - stable
    - archaeology
    - recovery
    - level:3
    timeout: 180s
    context:
      workflow_id: wf-arch-recovery
      euclo.mode: archaeology
    setup:
      files:
      - path: testsuite/fixtures/arch_recovery/util.go
        content: "package archrecovery\n\nfunc Double(n int) int {\n  return n * 2\n\
          }\n"
      workflows:
      - workflow:
          workflow_id: wf-arch-recovery
          task_type: code_modification
          instruction: Add Triple function
          status: running
        runs:
        - run_id: arch-recovery-run
          status: running
        knowledge:
        - record_id: arch-recovery-plan
          kind: fact
          title: Compiled plan with recovery hint
          content: 'Step 1: attempt to write to testsuite/fixtures/arch_recovery/nonexistent_dir/util.go
            (this path is invalid and will fail). On failure, fall back to testsuite/fixtures/arch_recovery/util.go:
            add a Triple(n int) int function that returns n * 3.

            '
          status: accepted
    prompt: 'Apply the compiled plan from the workflow knowledge for testsuite/fixtures/arch_recovery/util.go.
      If the primary step fails, use the fallback described in the plan.

      '
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/fixtures/arch_recovery/util.go
