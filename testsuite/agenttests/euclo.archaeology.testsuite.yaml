apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo.archaeology
  description: "Euclo archaeology mode: explore → compile-plan → implement-plan capability chain."
  owner: agent-platform
  tier: stable
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: false
    timeout: 180s
  workspace:
    strategy: derived
    exclude:
      - .git/**
      - .gocache/**
      - .gomodcache/**
      - relurpify_cfg/test_runs/**
  models:
    - name: qwen2.5-coder:14b
      endpoint: http://localhost:11434
  recording:
    mode: off
  cases:
    - name: explore_codebase_pattern
      description: "Archaeology explore: produces an exploration artifact from a 3-file Go package."
      task_type: analysis
      tags: [coverage-matrix, archaeology, explore, level:2]
      setup:
        files:
          - path: testsuite/fixtures/arch_pkg/types.go
            content: |
              package archpkg

              type Request struct {
                ID      string
                Payload []byte
              }

              type Response struct {
                Status  int
                Message string
              }
          - path: testsuite/fixtures/arch_pkg/handler.go
            content: |
              package archpkg

              import "fmt"

              func Handle(req Request) Response {
                if len(req.Payload) == 0 {
                  return Response{Status: 400, Message: "empty payload"}
                }
                return Response{Status: 200, Message: fmt.Sprintf("handled %s", req.ID)}
              }
          - path: testsuite/fixtures/arch_pkg/handler_test.go
            content: |
              package archpkg

              import "testing"

              func TestHandle(t *testing.T) {
                r := Handle(Request{ID: "test", Payload: []byte("data")})
                if r.Status != 200 {
                  t.Errorf("got %d, want 200", r.Status)
                }
              }
      prompt: >
        Explore the Go package in testsuite/fixtures/arch_pkg/ and produce an exploration
        artifact describing its structure, types, and relationships. Do not modify any files.
      context:
        euclo.mode: archaeology
      expect:
        must_succeed: true
        no_file_changes: true
        state_keys_must_exist:
          - euclo.interaction_state
          - euclo.artifacts
        euclo:
          artifacts_produced:
            - exploration

    - name: compile_plan_from_exploration
      description: "Archaeology compile-plan: builds a structured plan from prior exploration results."
      task_type: analysis
      tags: [stable, archaeology, compile-plan, level:3]
      timeout: 180s
      context:
        workflow_id: wf-arch-compile-plan
        euclo.mode: archaeology
      setup:
        files:
          - path: testsuite/fixtures/arch_pkg/types.go
            content: |
              package archpkg

              type Request struct {
                ID      string
                Payload []byte
              }

              type Response struct {
                Status  int
                Message string
              }
          - path: testsuite/fixtures/arch_pkg/handler.go
            content: |
              package archpkg

              import "fmt"

              func Handle(req Request) Response {
                if len(req.Payload) == 0 {
                  return Response{Status: 400, Message: "empty payload"}
                }
                return Response{Status: 200, Message: fmt.Sprintf("handled %s", req.ID)}
              }
        workflows:
          - workflow:
              workflow_id: wf-arch-compile-plan
              task_type: analysis
              instruction: Add error wrapping to the Handle function
              status: running
            runs:
              - run_id: arch-explore-run
                status: running
            knowledge:
              - record_id: arch-exploration-result
                kind: fact
                title: Exploration result
                content: >
                  Package archpkg has 2 files. types.go defines Request (ID string, Payload []byte)
                  and Response (Status int, Message string). handler.go implements Handle(req Request)
                  Response which returns 400 for empty payload and 200 otherwise. No error wrapping
                  is present. Target: add fmt.Errorf wrapping to handle error conditions.
                status: accepted
      prompt: >
        Using the prior exploration results for testsuite/fixtures/arch_pkg/, compile an
        implementation plan for adding structured error wrapping to the Handle function.
        Do not modify any files.
      expect:
        must_succeed: true
        no_file_changes: true
        state_keys_must_exist:
          - euclo.interaction_state
          - euclo.artifacts
        euclo:
          artifacts_produced:
            - plan

    - name: implement_from_plan
      description: "Archaeology implement-plan: applies file edits from a seeded compiled plan."
      task_type: code_modification
      tags: [stable, archaeology, implement-plan, level:2]
      timeout: 180s
      context:
        workflow_id: wf-arch-implement
        euclo.mode: archaeology
      setup:
        files:
          - path: testsuite/fixtures/arch_impl/handler.go
            content: |
              package archimpl

              func Handle(payload []byte) string {
                if len(payload) == 0 {
                  return "error: empty"
                }
                return "ok"
              }
        workflows:
          - workflow:
              workflow_id: wf-arch-implement
              task_type: code_modification
              instruction: Add a validation helper to the handler
              status: running
            runs:
              - run_id: arch-plan-run
                status: running
            knowledge:
              - record_id: arch-plan-result
                kind: fact
                title: Compiled plan
                content: >
                  Plan: add a validate(payload []byte) bool helper to testsuite/fixtures/arch_impl/handler.go
                  that returns false when payload is nil or empty. Update Handle to call validate and
                  return "error: invalid" when validation fails.
                status: accepted
      prompt: >
        Apply the compiled plan from the workflow knowledge: add a validate helper to
        testsuite/fixtures/arch_impl/handler.go as described. Use file_write to apply the change.
      expect:
        must_succeed: true
        files_changed:
          - testsuite/fixtures/arch_impl/handler.go

    - name: archaeology_resume
      description: "Archaeology resume: continues from a seeded exploration phase checkpoint."
      task_type: analysis
      tags: [stable, archaeology, resume, level:3]
      timeout: 180s
      context:
        workflow_id: wf-arch-resume
        euclo.mode: archaeology
        euclo.interaction_state:
          mode: archaeology
          current_phase: compile-plan
          phases_executed:
            - explore
          phase_states:
            explore.done: true
      setup:
        files:
          - path: testsuite/fixtures/arch_resume/store.go
            content: |
              package archresume

              type Store struct{ data map[string]string }

              func (s *Store) Set(k, v string) { s.data[k] = v }
              func (s *Store) Get(k string) string { return s.data[k] }
        workflows:
          - workflow:
              workflow_id: wf-arch-resume
              task_type: analysis
              instruction: Explore and plan improvements to the Store type
              status: running
            runs:
              - run_id: arch-resume-run
                status: running
            knowledge:
              - record_id: arch-resume-explore
                kind: fact
                title: Prior exploration
                content: >
                  Store has no nil-check in Set and Get does not distinguish missing vs empty values.
                  Improvement opportunity: add a Delete method and return (string, bool) from Get.
                status: accepted
      prompt: >
        Resume the archaeology session for testsuite/fixtures/arch_resume/store.go.
        The exploration phase is complete. Continue with compile-plan: generate a
        structured improvement plan from the prior exploration. Do not modify any files.
      expect:
        must_succeed: true
        no_file_changes: true
        state_keys_must_exist:
          - euclo.interaction_state
        euclo:
          phases_executed:
            - explore

    - name: archaeology_recovery
      description: "Archaeology recovery: implement-plan with a broken step triggers recovery strategy."
      task_type: code_modification
      tags: [stable, archaeology, recovery, level:3]
      timeout: 180s
      context:
        workflow_id: wf-arch-recovery
        euclo.mode: archaeology
      setup:
        files:
          - path: testsuite/fixtures/arch_recovery/util.go
            content: |
              package archrecovery

              func Double(n int) int {
                return n * 2
              }
        workflows:
          - workflow:
              workflow_id: wf-arch-recovery
              task_type: code_modification
              instruction: Add Triple function
              status: running
            runs:
              - run_id: arch-recovery-run
                status: running
            knowledge:
              - record_id: arch-recovery-plan
                kind: fact
                title: Compiled plan with recovery hint
                content: >
                  Step 1: attempt to write to testsuite/fixtures/arch_recovery/nonexistent_dir/util.go
                  (this path is invalid and will fail). On failure, fall back to
                  testsuite/fixtures/arch_recovery/util.go: add a Triple(n int) int function
                  that returns n * 3.
                status: accepted
      prompt: >
        Apply the compiled plan from the workflow knowledge for
        testsuite/fixtures/arch_recovery/util.go. If the primary step fails, use the
        fallback described in the plan.
      expect:
        must_succeed: true
        files_changed:
          - testsuite/fixtures/arch_recovery/util.go
