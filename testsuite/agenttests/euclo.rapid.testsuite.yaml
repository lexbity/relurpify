apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: euclo.rapid
  description: "Legacy aggregate rapid suite entrypoint — use euclo.rapid.chat, euclo.rapid.debug, euclo.rapid.archaeology instead. Retained as a single-entry smoke check."
  owner: agent-platform
  tier: live-flaky
  quarantined: false
spec:
  agent_name: euclo
  manifest: relurpify_cfg/agent.manifest.yaml
  execution:
    profile: ci-live
    strict: true
    timeout: 75s
  workspace:
    strategy: derived
    exclude:
      - .git/**
      - .gocache/**
      - .gomodcache/**
      - relurpify_cfg/test_runs/**
    ignore_changes:
      - relurpify_cfg/logs/skills.log
      - relurpify_cfg/artifacts/euclo/deferred/**
      - '**/*.bak'
  models:
    - name: qwen2.5-coder:14b
      endpoint: http://localhost:11434
  recording:
    mode: off
  cases:
    - name: rapid_smoke_debug_via_suite_ref
      description: "Smoke test that references the canonical debug suite fixture — validates agent wiring and test discovery."
      task_type: code_modification
      tags: [smoke, rapid-iteration, debug, level:1]
      setup:
        files:
          - path: testsuite/fixtures/rapid_debug/math.go
            content: |
              package rapiddebug

              func Divide(a, b int) int {
                if b == 0 {
                  return 0
                }
                return a * b
              }
          - path: testsuite/fixtures/rapid_debug/math_test.go
            content: |
              package rapiddebug

              import "testing"

              func TestDivide(t *testing.T) {
                if Divide(12, 3) != 4 {
                  t.Fatalf("got %d, want 4", Divide(12, 3))
                }
              }
      prompt: "Debug the failing Divide behavior in testsuite/fixtures/rapid_debug and fix the implementation."
      context:
        mode: debug
      overrides:
        max_iterations: 4
      expect:
        must_succeed: true
        files_changed:
          - testsuite/fixtures/rapid_debug/math.go
        tool_calls_must_include:
          - file_read
          - file_write
          - go_test
        max_tool_calls: 25
        files_contain:
          - path: testsuite/fixtures/rapid_debug/math.go
            contains: ["return a / b"]
        euclo:
          behavior_family: stale_assumption_detection
          mode: debug
          profile: reproduce_localize_patch
