apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: testfu.smoke
  description: 'Smoke coverage for the testfu agent: list, run-suite, run-case, and
    tag-filter paths.'
  owner: agent-platform
  tier: smoke
  quarantined: false
spec:
  agent_name: testfu
  manifest: relurpify_cfg/agents/testfu.yaml
  execution:
    profile: ci-live
    strict: false
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - .gocache/**
    - .gomodcache/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  cases:
  - name: list_suites
    tags:
    - smoke
    task_type: analysis
    prompt: list_suites
    context:
      action: list_suites
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)(react|planner|htn|rewoo|reflection)
        no_file_changes: true
  - name: run_react_smoke
    tags:
    - smoke
    task_type: analysis
    timeout: 480s
    prompt: Run the react agent test suite.
    context:
      action: run_suite
      suite_path: testsuite/agenttests/react.testsuite.yaml
      timeout: 60s
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
  - name: run_single_case
    tags:
    - smoke
    task_type: analysis
    timeout: 120s
    prompt: Run the single case edit_fixture_file from the react suite.
    context:
      action: run_case
      suite_path: testsuite/agenttests/react.testsuite.yaml
      case_name: edit_fixture_file
      timeout: 90s
    expect:
      outcome:
        must_succeed: true
  - name: run_with_tag_filter
    tags:
    - smoke
    task_type: analysis
    timeout: 480s
    prompt: Run all react suites with only smoke-tagged cases.
    context:
      agent_name: react
      tags: smoke
      timeout: 60s
    expect:
      outcome:
        must_succeed: true
        no_file_changes: true
