apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: coding.sqlite
  description: "SQLite-focused prompts for the coding agent (easy→hard)."
spec:
  agent_name: coding
  manifest: relurpify_cfg/agents/coding-sqlite.yaml
  workspace:
    strategy: derived
    exclude:
      - .git/**
      - relurpify_cfg/test_runs/**
  models:
    - name: qwen2.5-coder:14b
      endpoint: http://localhost:11434
  cases:
    - name: easy_fix_query_and_run
      task_type: code_modification
      requires:
        executables: ["sqlite3"]
        tools: ["cli_sqlite3"]
      setup:
        files:
          - path: testsuite/agenttest_fixtures/sqlsuite/schema.sql
            content: |
              CREATE TABLE users (
                id INTEGER PRIMARY KEY,
                name TEXT NOT NULL
              );

              CREATE TABLE posts (
                id INTEGER PRIMARY KEY,
                user_id INTEGER NOT NULL,
                title TEXT NOT NULL,
                FOREIGN KEY (user_id) REFERENCES users(id)
              );
          - path: testsuite/agenttest_fixtures/sqlsuite/seed.sql
            content: |
              INSERT INTO users (id, name) VALUES (1, 'alice');
              INSERT INTO users (id, name) VALUES (2, 'bob');

              INSERT INTO posts (id, user_id, title) VALUES (1, 1, 'hello');
              INSERT INTO posts (id, user_id, title) VALUES (2, 1, 'world');
              INSERT INTO posts (id, user_id, title) VALUES (3, 2, 'first');
          - path: testsuite/agenttest_fixtures/sqlsuite/query.sql
            content: |
              -- Return each user name and post count, descending by count then name.
              SELECT u.name, COUNT(p.id) AS post_count
              FROM users u
              LEFT JOIN posts p ON p.user_id = u.id
              GROUP BY u.id
              ORDER BY u.name ASC;
      overrides:
        allowed_tools: ["cli_sqlite3"]
      prompt: |
        Fix testsuite/agenttest_fixtures/sqlsuite/query.sql so it returns results ordered by post_count DESC then name ASC.

        Verify by running cli_sqlite3 args [":memory:"] with working_directory "testsuite/agenttest_fixtures/sqlsuite" and stdin:
        .mode list
        .separator |
        .read schema.sql
        .read seed.sql
        .read query.sql
      expect:
        must_succeed: true
        files_changed: ["testsuite/agenttest_fixtures/sqlsuite/query.sql"]
        output_regex:
          - (?m)^alice\\|2$
          - (?m)^bob\\|1$
        tool_calls_must_include: ["cli_sqlite3"]
        tool_calls_must_exclude: ["exec_run_tests"]

