apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
  name: coding.python
  description: Python-focused prompts for the coding agent across common workflows.
  owner: agent-platform
  tier: stable
  quarantined: false
spec:
  agent_name: coding
  manifest: relurpify_cfg/agents/coding-python.yaml
  execution:
    profile: ci-live
    strict: true
  workspace:
    strategy: derived
    exclude:
    - .git/**
    - relurpify_cfg/test_runs/**
  models:
  - name: qwen2.5-coder:14b
    endpoint: http://localhost:11434
  cases:
  - name: easy_fix_bug_and_run_tests
    task_type: code_modification
    requires:
      executables:
      - python3
      tools:
      - cli_python
    setup:
      files:
      - path: testsuite/agenttest_fixtures/pysuite/calc.py
        content: "def add(a: int, b: int) -> int:\n    return a + b + 1\n\n\ndef mul(a: int, b: int) -> int:\n    return a\
          \ * b\n"
      - path: testsuite/agenttest_fixtures/pysuite/test_calc.py
        content: "import unittest\n\nimport calc\n\n\nclass TestCalc(unittest.TestCase):\n    def test_add(self) -> None:\n\
          \        self.assertEqual(calc.add(2, 2), 4)\n\n    def test_mul(self) -> None:\n        self.assertEqual(calc.mul(3,\
          \ 4), 12)\n\n\nif __name__ == \"__main__\":\n    unittest.main()\n"
    overrides:
      allowed_capabilities:
      - name: cli_python
        kind: tool
    prompt: Fix the failing tests in testsuite/agenttest_fixtures/pysuite (do not change test_calc.py), then run cli_python
      args ["test_calc.py"] with working_directory "testsuite/agenttest_fixtures/pysuite".
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/pysuite/calc.py
      benchmark:
        tools_expected:
        - cli_python
  - name: medium_add_div_and_test
    task_type: code_modification
    requires:
      executables:
      - python3
      tools:
      - cli_python
    setup:
      files:
      - path: testsuite/agenttest_fixtures/pysuite/calc.py
        content: "def add(a: int, b: int) -> int:\n    return a + b\n\n\ndef mul(a: int, b: int) -> int:\n    return a * b\n"
      - path: testsuite/agenttest_fixtures/pysuite/test_calc.py
        content: "import unittest\n\nimport calc\n\n\nclass TestCalc(unittest.TestCase):\n    def test_add(self) -> None:\n\
          \        self.assertEqual(calc.add(2, 2), 4)\n\n    def test_mul(self) -> None:\n        self.assertEqual(calc.mul(3,\
          \ 4), 12)\n\n    def test_div(self) -> None:\n        self.assertEqual(calc.div(10, 2), 5)\n        with self.assertRaises(ZeroDivisionError):\n\
          \            calc.div(1, 0)\n\n\nif __name__ == \"__main__\":\n    unittest.main()\n"
    overrides:
      allowed_capabilities:
      - name: cli_python
        kind: tool
    prompt: 'Implement div(a: int, b: int) -> int in testsuite/agenttest_fixtures/pysuite/calc.py (raise ZeroDivisionError
      on division by zero; do not change tests), then run cli_python args ["test_calc.py"] with working_directory "testsuite/agenttest_fixtures/pysuite".'
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/pysuite/calc.py
      benchmark:
        tools_expected:
        - cli_python
  - name: syntax_error_fix_and_run_tests
    task_type: code_modification
    requires:
      executables:
      - python3
      tools:
      - cli_python
    setup:
      files:
      - path: testsuite/agenttest_fixtures/pysuite/calc.py
        content: "def add(a: int, b: int) -> int:\n    return a + b\n\n\ndef mul(a: int, b: int) -> int:\n    return a * b\n"
      - path: testsuite/agenttest_fixtures/pysuite/test_calc.py
        content: "import unittest\n\nimport calc\n\n\nclass TestCalc(unittest.TestCase):\n    def test_add(self) -> None:\n\
          \        self.assertEqual(calc.add(2, 2), 4)\n\n\nif __name__ == \"__main__\":\n    unittest.main(\n"
    overrides:
      allowed_capabilities:
      - name: cli_python
        kind: tool
    prompt: Fix the syntax error in testsuite/agenttest_fixtures/pysuite/test_calc.py without changing the test intent, then
      run cli_python args ["test_calc.py"] with working_directory "testsuite/agenttest_fixtures/pysuite".
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/pysuite/test_calc.py
      benchmark:
        tools_expected:
        - cli_python
  - name: verify_already_correct_without_edits
    task_type: analysis
    requires:
      executables:
      - python3
      tools:
      - cli_python
    setup:
      files:
      - path: testsuite/agenttest_fixtures/pysuite/calc.py
        content: "def add(a: int, b: int) -> int:\n    return a + b\n"
      - path: testsuite/agenttest_fixtures/pysuite/test_calc.py
        content: "import unittest\n\nimport calc\n\n\nclass TestCalc(unittest.TestCase):\n    def test_add(self) -> None:\n\
          \        self.assertEqual(calc.add(2, 2), 4)\n\n\nif __name__ == \"__main__\":\n    unittest.main()\n"
    overrides:
      allowed_capabilities:
      - name: cli_python
        kind: tool
    prompt: Run cli_python args ["test_calc.py"] with working_directory "testsuite/agenttest_fixtures/pysuite" and confirm
      whether the module is already correct. Do not modify any files.
    expect:
      outcome:
        must_succeed: true
        output_regex:
        - (?i)(correct|passes|ok)
        no_file_changes: true
      benchmark:
        tools_expected:
        - cli_python
  - name: multi_file_module_fix_and_run_tests
    task_type: code_modification
    requires:
      executables:
      - python3
      tools:
      - cli_python
    setup:
      files:
      - path: testsuite/agenttest_fixtures/pysuite/calc.py
        content: "from helpers import add\n\n\ndef mul(a: int, b: int) -> int:\n    return a * b\n"
      - path: testsuite/agenttest_fixtures/pysuite/helpers.py
        content: "def add(a: int, b: int) -> int:\n    return a + b\n"
      - path: testsuite/agenttest_fixtures/pysuite/test_calc.py
        content: "import unittest\n\nimport calc\n\n\nclass TestCalc(unittest.TestCase):\n    def test_add(self) -> None:\n\
          \        self.assertEqual(calc.add(2, 2), 4)\n\n    def test_sub(self) -> None:\n        self.assertEqual(calc.sub(5,\
          \ 3), 2)\n\n\nif __name__ == \"__main__\":\n    unittest.main()\n"
    overrides:
      allowed_capabilities:
      - name: cli_python
        kind: tool
    prompt: 'Implement sub(a: int, b: int) -> int in testsuite/agenttest_fixtures/pysuite/helpers.py and export it from testsuite/agenttest_fixtures/pysuite/calc.py
      without changing tests, then run cli_python args ["test_calc.py"] with working_directory "testsuite/agenttest_fixtures/pysuite".'
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/pysuite/calc.py
        - testsuite/agenttest_fixtures/pysuite/helpers.py
      benchmark:
        tools_expected:
        - cli_python
  - name: verify_pytest_oracle
    task_type: code_modification
    requires:
      executables:
      - python3
      tools:
      - cli_python
    setup:
      files:
      - path: testsuite/agenttest_fixtures/pysuite/calc/calc.py
        content: "def add(a: int, b: int) -> int:\n    return a + b + 1\n\n\ndef mul(a: int, b: int) -> int:\n    return a\
          \ * b\n"
    overrides:
      allowed_capabilities:
      - name: cli_python
        kind: tool
    prompt: Fix testsuite/agenttest_fixtures/pysuite/calc/calc.py so the permanent pytest oracle in testsuite/agenttest_fixtures/pysuite/calc/test_calc.py
      passes, then run cli_python args ["test_calc.py"] with working_directory "testsuite/agenttest_fixtures/pysuite/calc".
    expect:
      outcome:
        must_succeed: true
        files_changed:
        - testsuite/agenttest_fixtures/pysuite/calc/calc.py
        verify:
          steps:
          - tool: python_pytest
            args:
              working_directory: testsuite/agenttest_fixtures/pysuite/calc
              test_path: test_calc.py
        extensions:
          euclo:
            mode: code
      benchmark:
        tools_expected:
        - cli_python
