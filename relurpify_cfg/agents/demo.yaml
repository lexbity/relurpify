apiVersion: relurpify/v1alpha1
kind: AgentManifest
metadata:
    name: demo
    version: 1.0.0
    description: Demo agent manifest
spec:
    image: ghcr.io/lexcodex/relurpify/runtime:latest
    runtime: gvisor
    defaults:
        permissions:
            filesystem:
                - action: fs:read
                  path: /home/lex/Public/Relurpify/**
                  justification: Read workspace
                - action: fs:list
                  path: /home/lex/Public/Relurpify/**
                  justification: List workspace
            network:
                - direction: egress
                  protocol: tcp
                  host: localhost
                  port: 11434
                  description: Ollama
        resources:
            limits:
                cpu: "1"
                memory: 1Gi
                disk_io: 100MBps
    security:
        run_as_user: 1000
        read_only_root: false
        no_new_privileges: true
    audit:
        level: verbose
        retention_days: 7
    agent:
        implementation: react
        mode: primary
        version: 1.0.0
        prompt: Demo agent for quick tests.
        model:
            provider: ollama
            name: qwen2.5-coder:14b
            temperature: 0.2
            max_tokens: 2048
        ollama_tool_calling: true
    skills:
        - system
