apiVersion: relurpify/v1alpha1
kind: ThoughtRecipe
metadata:
  name: Simple React Agent
  version: "1.0.0"
description: Basic single-step recipe using the React paradigm.
global:
  prompt: |
    You are executing a simple React workflow.
  configuration:
    families: [implementation, review]
    intent_keywords: [react, simple, quick]
    trigger_priority: 50
  context:
    sharing: carry_forward
sequence:
  - id: analyze
    mutation: none
    hitl: never
    parent:
      paradigm: react
      prompt: "Analyze the task: {{.Instruction}}"
      context:
        capture: [analysis]
