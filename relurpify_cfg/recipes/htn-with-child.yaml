apiVersion: relurpify/v1alpha1
kind: ThoughtRecipe
metadata:
  name: HTN Planning with React Child
  version: "1.0.0"
description: HTN-style planning with a react fallback step.
global:
  prompt: |
    Produce a structured plan before execution.
  configuration:
    families: [planning, implementation]
    intent_keywords: [plan, htn, hierarchical]
    trigger_priority: 70
  context:
    sharing: explicit
sequence:
  - id: plan
    mutation: none
    hitl: never
    parent:
      paradigm: htn
      prompt: |
        Create a plan for: {{.Instruction}}
        Context: {{.Instruction}}
    fallback:
      paradigm: react
      prompt: "Refine the plan into executable steps."
