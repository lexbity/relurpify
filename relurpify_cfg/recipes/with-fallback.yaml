apiVersion: relurpify/v1alpha1
kind: ThoughtRecipe
metadata:
  name: Recipe with Fallback Agent
  version: "1.0.0"
description: Recipe demonstrating a fallback step.
global:
  prompt: |
    Attempt the primary plan first, then fall back if needed.
  configuration:
    families: [repair, implementation]
    intent_keywords: [fallback, safe, robust]
    trigger_priority: 55
  context:
    sharing: isolated
sequence:
  - id: primary
    mutation: required
    hitl: ask
    parent:
      paradigm: goalcon
      prompt: "Attempt to solve: {{.Instruction}}"
      context:
        capture: [primary_result]
    fallback:
      paradigm: planner
      prompt: "Primary execution failed. Produce a diagnostic fallback plan."
