apiVersion: relurpify/v1alpha1
kind: ThoughtRecipe
metadata:
  name: Multi-Step with Data Capture
  version: "1.0.0"
description: Multi-step workflow demonstrating capture and carry-forward context.
global:
  prompt: |
    You are working on a multi-step task.
  configuration:
    families: [planning, investigation, implementation]
    intent_keywords: [multi, step, capture]
    trigger_priority: 60
  context:
    sharing: carry_forward
    stream:
      query_template: "Workspace context for: {{.Instruction}}"
      max_tokens: 4096
      mode: blocking
    aliases:
      explored_files: euclo.recipe.multi-step-capture.explored_files
      analysis_result: euclo.recipe.multi-step-capture.analysis_result
sequence:
  - id: explore
    mutation: none
    hitl: never
    parent:
      paradigm: blackboard
      prompt: "Explore the codebase and identify files relevant to: {{.Instruction}}"
      context:
        capture: [explored_files]
  - id: analyze
    mutation: none
    hitl: never
    parent:
      paradigm: reflection
      prompt: |
        Analyze the files found in the previous step:
        {{explored_files}}
      context:
        inherit: [explored_files]
        capture: [analysis_result]
  - id: implement
    mutation: required
    hitl: ask
    parent:
      paradigm: react
      prompt: |
        Based on the analysis:
        {{analysis_result}}
        Implement the required changes.
      context:
        inherit: [analysis_result]
