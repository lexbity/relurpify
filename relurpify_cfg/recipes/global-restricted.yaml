apiVersion: v1
kind: ThoughtRecipe
metadata:
  id: global-restricted
  name: Globally Restricted Capabilities
  version: "1.0.0"
triggers:
  keywords: ["safe", "read-only", "analyze"]
  priority: 40
execution:
  sharing_mode: explicit
  global_capabilities:
    - cap:file_read
    - cap:search
    - cap:index_query
  global_enrichment: [ast, archaeology]
  steps:
    - id: analyze
      prompt: |
        Analyze the codebase for: {{task.instruction}}
        You have read-only access.
      agent:
        paradigm: blackboard
        enrichment: [ast]
      capture: [analysis]
