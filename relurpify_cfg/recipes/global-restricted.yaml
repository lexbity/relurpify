apiVersion: relurpify/v1alpha1
kind: ThoughtRecipe
metadata:
  name: Globally Restricted Capabilities
  version: "1.0.0"
description: Read-only recipe for analysis tasks.
global:
  prompt: |
    Analyze the codebase without mutating files.
  configuration:
    families: [review, investigation, architecture]
    intent_keywords: [safe, read-only, analyze]
    trigger_priority: 40
  context:
    sharing: explicit
    ingest:
      mode: files_only
      include_globs: ["**/*.go", "**/*.md"]
      exclude_globs: ["vendor/**"]
sequence:
  - id: analyze
    mutation: none
    hitl: never
    parent:
      paradigm: blackboard
      prompt: |
        Analyze the codebase for: {{.Instruction}}
        You have read-only access.
      context:
        capture: [analysis]
