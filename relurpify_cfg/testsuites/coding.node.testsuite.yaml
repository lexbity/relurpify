apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
    name: coding.node
    description: Node.js-focused coding prompts
spec:
    agent_name: coding
    manifest: ../agents/coding-node.yaml
    workspace:
        strategy: in_place
        exclude:
            - .git/**
            - .gocache/**
            - .gomodcache/**
            - relurpify_cfg/test_runs/**
    models:
        - name: qwen2.5-coder:14b
          endpoint: http://localhost:11434
    cases:
        - name: easy_fix_bug_and_run_tests
          task_type: code_modification
          prompt: Fix the failing tests in testsuite/agenttest_fixtures/nodesuite (do not change test_sum.js), then run cli_node args ["test_sum.js"] with working_directory "testsuite/agenttest_fixtures/nodesuite".
          setup:
            files:
                - path: testsuite/agenttest_fixtures/nodesuite/sum.js
                  content: |
                    function add(a, b) {
                      return a + b + 1;
                    }

                    module.exports = { add };
                - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
                  content: |
                    const assert = require("assert");
                    const { add } = require("./sum");

                    assert.strictEqual(add(2, 2), 4);
                    assert.strictEqual(add(-1, 1), 0);

                    console.log("ok");
          requires:
            executables:
                - node
            tools:
                - cli_node
          expect:
            must_succeed: true
            files_changed:
                - testsuite/agenttest_fixtures/nodesuite/sum.js
            tool_calls_must_include:
                - cli_node
            tool_calls_must_exclude:
                - exec_run_tests
          overrides:
            allowed_tools:
                - cli_node
        - name: medium_add_mul_and_run_tests
          task_type: code_modification
          prompt: Implement mul(a,b) in testsuite/agenttest_fixtures/nodesuite/sum.js (do not change test_sum.js), then run cli_node args ["test_sum.js"] with working_directory "testsuite/agenttest_fixtures/nodesuite".
          setup:
            files:
                - path: testsuite/agenttest_fixtures/nodesuite/sum.js
                  content: |
                    function add(a, b) {
                      return a + b;
                    }

                    module.exports = { add };
                - path: testsuite/agenttest_fixtures/nodesuite/test_sum.js
                  content: |
                    const assert = require("assert");
                    const { add, mul } = require("./sum");

                    assert.strictEqual(add(2, 2), 4);
                    assert.strictEqual(mul(3, 4), 12);

                    console.log("ok");
          requires:
            executables:
                - node
            tools:
                - cli_node
          expect:
            must_succeed: true
            files_changed:
                - testsuite/agenttest_fixtures/nodesuite/sum.js
            tool_calls_must_include:
                - cli_node
            tool_calls_must_exclude:
                - exec_run_tests
          overrides:
            allowed_tools:
                - cli_node
