apiVersion: relurpify/v1alpha1
kind: AgentTestSuite
metadata:
    name: react
    description: Default tests for react
spec:
    agent_name: react
    manifest: ../agents/react.yaml
    workspace:
        strategy: in_place
        exclude:
            - .git/**
            - .gocache/**
            - .gomodcache/**
            - relurpify_cfg/test_runs/**
    models:
        - name: qwen2.5-coder:14b
          endpoint: http://localhost:11434
    recording:
        mode: "off"
    cases:
        - name: summarize_readme
          task_type: code_generation
          prompt: Summarize README.md in 5 bullets.
          context:
            path: README.md
          expect:
            must_succeed: true
            output_regex:
                - (?i)relurpify
            tool_calls_must_exclude:
                - file_write
                - file_edit
                - file_create
                - file_delete
        - name: edit_fixture_file
          task_type: code_modification
          prompt: Edit testsuite/agenttest_fixtures/hello.txt by appending a new line containing 'DONE'.
          setup:
            files:
                - path: testsuite/agenttest_fixtures/hello.txt
                  content: |
                    hello
          expect:
            must_succeed: true
            files_changed:
                - testsuite/agenttest_fixtures/hello.txt
            tool_calls_must_include:
                - file_write
