apiVersion: relurpify/v1alpha1
kind: SkillManifest
metadata:
  name: ccoder
  version: 1.0.0
  description: C/C++ tooling for builds.
spec:
  requires:
    bins: [cmake]
  prompt_snippets:
    - "For C and C++, identify the active build system files before editing and verify changes with the narrowest available build command."
  allowed_capabilities:
    - name: cli_cmake
      kind: tool
    - name: cli_make
      kind: tool
  phase_capability_selectors:
    explore:
      - capability: file_read
      - capability: file_list
      - capability: file_search
      - capability: query_ast
    edit:
      - capability: file_read
      - capability: file_write
      - capability: file_create
      - capability: file_list
      - capability: file_search
      - capability: query_ast
      - capability: cli_cmake
      - capability: cli_make
    verify:
      - capability: cli_cmake
      - capability: cli_make
      - capability: file_read
  verification:
    success_capability_selectors:
      - capability: cli_make
      - capability: cli_cmake
    stop_on_success: true
  recovery:
    failure_probe_capability_selectors:
      - capability: file_read
      - capability: file_search
      - capability: query_ast
  planning:
    required_before_edit:
      - capability: file_read
      - capability: file_search
    preferred_edit_capabilities:
      - capability: file_write
    preferred_verify_capabilities:
      - capability: cli_make
      - capability: cli_cmake
    step_templates:
      - kind: discover
        description: Inspect CMakeLists.txt, Makefile, and affected source or header files before editing.
      - kind: edit
        description: Make focused source or build configuration changes after locating the active target files.
      - kind: verify
        description: Re-run the narrowest build command that validates the edited target or project.
    require_verification_step: true
  review:
    criteria:
      - correctness
      - completeness
      - verification evidence
      - build configuration consistency
    focus_tags:
      - diagnostics
      - verification
    approval_rules:
      require_verification_evidence: true
      reject_on_unresolved_errors: true
    severity_weights:
      high: 1.0
      medium: 0.5
      low: 0.2
