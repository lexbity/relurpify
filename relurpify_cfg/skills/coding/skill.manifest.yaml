apiVersion: relurpify/v1alpha1
kind: SkillManifest
metadata:
  name: coding
  version: 1.0.0
  description: General coding tools (git + repo hygiene).
spec:
  requires:
    bins: [git]
  prompt_snippets:
    - "Follow project conventions and summarize changes."
  allowed_capabilities:
    - name: git_diff
      kind: tool
    - name: git_history
      kind: tool
    - name: git_blame
      kind: tool
    - name: git_branch
      kind: tool
    - name: git_commit
      kind: tool
  tool_execution_policy:
    git_commit:
      execute: ask
