apiVersion: relurpify/v1alpha1
kind: SkillManifest
metadata:
  name: coding
  version: 1.0.0
  description: General coding tools (git + repo hygiene).
spec:
  requires:
    bins: [git]
  prompt_snippets:
    - "Follow project conventions and summarize changes."
  allowed_tools:
    - git_diff
    - git_history
    - git_blame
    - git_branch
    - git_commit
  tool_execution_policy:
    git_commit:
      execute: ask
