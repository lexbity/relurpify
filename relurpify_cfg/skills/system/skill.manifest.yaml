apiVersion: relurpify/v1alpha1
kind: SkillManifest
metadata:
  name: system
  version: 1.0.0
  description: Base system access and foundational tools.
spec:
  prompt_snippets:
    - "Use file and search tools before editing. Prefer explicit file paths."
  allowed_capabilities:
    - name: file_read
      kind: tool
    - name: file_write
      kind: tool
    - name: file_edit
      kind: tool
    - name: file_list
      kind: tool
    - name: file_search
      kind: tool
    - name: file_create
      kind: tool
    - name: search_find_similar
      kind: tool
    - name: search_semantic
      kind: tool
    - name: query_ast
      kind: tool
    - name: cli_rg
      kind: tool
    - name: cli_sed
      kind: tool
    - name: cli_find
      kind: tool
    - name: cli_mkdir
      kind: tool
